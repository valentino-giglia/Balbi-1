<div class="evento-agenda-crear-modal">
  <h2 mat-dialog-title>Crear evento de agenda</h2>
  <mat-dialog-content>
    @if (loadingData) {
      <div class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
        <mat-spinner diameter="50"></mat-spinner>
      </div>
    } @else {
      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }
      <form [formGroup]="form">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Tipo</mat-label>
          <mat-select formControlName="tipo">
            @for (t of tipos; track t.value) {
              <mat-option [value]="t.value">{{ t.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Profesional *</mat-label>
          <mat-select formControlName="profesionalID">
            @for (p of profesionales; track p.id) {
              <mat-option [value]="p.id">{{ p.nombre }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Fecha *</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="fecha" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Hora inicio *</mat-label>
          <input matInput type="time" formControlName="horaInicio" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Duración (minutos) *</mat-label>
          <input matInput type="number" formControlName="duracionMinutos" min="1" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Notas</mat-label>
          <textarea matInput formControlName="notas" rows="2"></textarea>
        </mat-form-field>
      </form>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-stroked-button (click)="cancelar()" [disabled]="loading">Cancelar</button>
    <button mat-raised-button color="primary" (click)="crear()" [disabled]="loading || form.invalid">
      @if (loading) { Creando... } @else { Crear evento }
    </button>
  </mat-dialog-actions>
</div>
