<div class="dashboard">
  <h1 class="mb-4">Veterinaria Balbi</h1>
  
  <div class="row mb-4">
    <div class="col-md-6 col-lg-3 mb-3">
      <mat-card class="stat-card" routerLink="/pacientes">
        <mat-card-content>
          <div class="row align-items-center">
            <div class="col-auto">
              <mat-icon class="stat-icon">person</mat-icon>
            </div>
            <div class="col">
              <div class="stat-info">
                <h2 class="m-0">{{ stats().tutores }}</h2>
                <p class="m-0 mt-1">Tutores</p>
              </div>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <mat-card class="stat-card" routerLink="/turnos">
        <mat-card-content>
          <div class="row align-items-center">
            <div class="col-auto">
              <mat-icon class="stat-icon">event</mat-icon>
            </div>
            <div class="col">
              <div class="stat-info">
                <h2 class="m-0">{{ stats().turnos }}</h2>
                <p class="m-0 mt-1">Turnos</p>
              </div>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>


    <div class="col-md-6 col-lg-3 mb-3">
      <mat-card class="stat-card">
        <mat-card-content>
          <div class="row align-items-center">
            <div class="col-auto">
              <mat-icon class="stat-icon" style="color: #4caf50;">check_circle</mat-icon>
            </div>
            <div class="col">
              <div class="stat-info">
                <h2 class="m-0">{{ stats().turnosReservados }}</h2>
                <p class="m-0 mt-1">Reservados</p>
              </div>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-md-6 col-lg-3 mb-3">
      <mat-card class="stat-card">
        <mat-card-content>
          <div class="row align-items-center">
            <div class="col-auto">
              <mat-icon class="stat-icon" style="color: #ff9800;">schedule</mat-icon>
            </div>
            <div class="col">
              <div class="stat-info">
                <h2 class="m-0">{{ stats().turnosPendientes }}</h2>
                <p class="m-0 mt-1">Pendientes</p>
              </div>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <div class="mt-3">
    <app-turnos></app-turnos>
  </div>
</div>
