          <div style={{ marginTop: 22, fontSize: 12, fontWeight: 700, color: '#666', letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 8 }}>Últimas atenciones</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {(window.CONSULTAS || []).filter(c => c.petId === pet.id).slice(0, 3).map(c => (
              <div key={c.id} style={{ padding: 12, border: '1px solid #EFEAEE', borderRadius: 10 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{c.motivo}</div>
                  <div style={{ fontSize: 11, color: '#888' }}>{c.date}</div>
                </div>
                <div style={{ fontSize: 12, color: '#666', marginTop: 4, lineHeight: 1.5 }}>{c.diagnostico}</div>
              </div>
            ))}
            {(window.CONSULTAS || []).filter(c => c.petId === pet.id).length === 0 && <div style={{ fontSize: 13, color: '#999', padding: '12px 0' }}>Sin consultas registradas</div>}
          </div>
        </>
      )}

      {confirmFall && (
        <Modal open={true} onClose={() => setConfirmFall(false)} title="Registrar fallecimiento" width={440}
          footer={<><Btn variant="ghost" onClick={() => setConfirmFall(false)}>Cancelar</Btn><Btn variant="danger" icon={<span>🕊</span>} onClick={handleMarcarFallecido} disabled={!fallData.cause.trim()}>Confirmar</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ padding: 12, background: '#FFF8F0', border: '1px solid #F5D9B5', borderRadius: 8, fontSize: 13, color: '#7A4A00' }}>
              Esto moverá a <strong>{pet.name}</strong> al apartado de fallecidos.
            </div>
            <Field label="Fecha de fallecimiento"><Input type="date" value={fallData.deathDate} onChange={(e) => setFallData({...fallData, deathDate: e.target.value})} /></Field>
            <Field label="Causa *"><textarea value={fallData.cause} onChange={(e) => setFallData({...fallData, cause: e.target.value})} rows={2} placeholder="Ej. Insuficiencia renal crónica" style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none' }} /></Field>
          </div>
        </Modal>
      )}
    </Drawer>
  );
};

const NewConsultaModal = ({ open, onClose, onAdd, initialPetId }) => {
  const pets = window.PETS || [];
  const [petId, setPetId] = useState(initialPetId || pets[0]?.id || 1);
  const [motivo, setMotivo] = useState('');
  const [fecha, setFecha] = useState(window.todayAR ? window.todayAR() : new Date().toISOString().slice(0,10));
  const [hora, setHora] = useState(() => { const n = new Date(); return n.toTimeString().slice(0,5); });
  const [vet, setVet] = useState('Dr. Balbi');
  const [fechaError, setFechaError] = useState('');
  React.useEffect(() => { if (initialPetId) setPetId(initialPetId); }, [initialPetId]);
  const handleCreate = () => {
    if (!motivo.trim()) return;
    const seleccionada = new Date(fecha + 'T' + hora);
    if (seleccionada < new Date()) { setFechaError('La fecha y hora no puede ser anterior al momento actual.'); return; }
    setFechaError('');
    const newC = { id: Date.now(), petId, date: fecha, time: hora, vet, motivo, anamnesis: '', diagnostico: '', tratamiento: '', peso: 0, temp: 38.5, fc: 88, estado: 'Estable' };
    if (onAdd) onAdd(newC);
    setMotivo('');
    onClose();
  };
  return (
    <Modal open={open} onClose={onClose} title="Nueva consulta" footer={
      <>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="primary" icon={<IconPlus />} onClick={handleCreate} disabled={!motivo.trim()}>Crear consulta</Btn>
      </>
    }>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field label="Paciente">
          <select value={petId} onChange={(e) => setPetId(+e.target.value)} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
            {pets.map(p => {
              const o = (window.CLIENTS || []).find(c => c.id === p.ownerId);
              return <option key={p.id} value={p.id}>{p.name} — {o?.name}</option>;
            })}
          </select>
        </Field>
        <Field label="Motivo">
          <Input placeholder="Control anual, vacuna, otitis…" value={motivo} onChange={(e) => setMotivo(e.target.value)} />
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Field label="Fecha"><Input type="date" value={fecha} onChange={(e) => { setFecha(e.target.value); setFechaError(''); }} /></Field>
          <Field label="Hora"><Input type="time" value={hora} onChange={(e) => { setHora(e.target.value); setFechaError(''); }} /></Field>
        </div>
        {fechaError && <div style={{ fontSize: 12, color: '#C2185B', background: '#FFF0F4', padding: '8px 12px', borderRadius: 8 }}>{fechaError}</div>}
        <Field label="Profesional">
          <select value={vet} onChange={(e) => setVet(e.target.value)} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
            <option value="Dr. Balbi">Dr. Pablo Balbi</option>
            <option value="Dra. Méndez">Dra. Carolina Méndez</option>
          </select>
        </Field>
      </div>
    </Modal>
  );
};

window.InternacionView = InternacionView;
window.ClientDrawer = ClientDrawer;
window.PetDrawer = PetDrawer;
window.NewConsultaModal = NewConsultaModal;
</script>


<script type="text/babel">
// Consultas: timeline + autosave + Libreta cards + Mensajes chat + Agenda Google-Calendar style
const ConsultaTimeline = ({ pet, openNewConsulta }) => {
  const [consultasList, setConsultasList] = useState([]);
  const [selected, setSelected] = useState(null);
  const sel = consultasList.find(c => c.id === selected) || consultasList[0];
  const isAdmin = window.Auth?.getRole?.() === 'admin';
  const isLocked = !!(sel && sel.id && sel.id < 2000000000);
  const [anam, setAnam] = useState(sel?.anamnesis || '');
  const [diag, setDiag] = useState(sel?.diagnostico || '');
  const [trat, setTrat] = useState(sel?.tratamiento || '');
  const [savedField, setSavedField] = useState(null);
  const [editingVitals, setEditingVitals] = useState(false);
  const [vitals, setVitals] = useState({ peso: sel?.peso || 0, temp: sel?.temp || 38.5, fc: sel?.fc || 88, estado: sel?.estado || 'Estable' });
  const [adjuntarModal, setAdjuntarModal] = useState(false);
  const [adjFile, setAdjFile] = useState(null);
  const [adjError, setAdjError] = useState('');
  const [adjUploading, setAdjUploading] = useState(false);
  const [adjFiles, setAdjFiles] = useState([]);
  const [recetaModal, setRecetaModal] = useState(false);
  const [showNewModal, setShowNewModal] = useState(false);

  React.useEffect(() => {
    if (!pet) return;
    const params = new URLSearchParams({ mascotaID: pet.id, pageSize: 20 });
    window.Auth.get('/files?' + params.toString()).then(res => setAdjFiles(res.data || [])).catch(() => {});
  }, [pet?.id]);

  React.useEffect(() => {
    if (!pet?.id) return;
    window.Auth.get('/consultas?mascotaID=' + pet.id).then(res => {
      const raw = Array.isArray(res) ? res : (res.data || []);
      const mapped = raw.map(c => ({
        id: c.id, petId: c.mascotaID,
        date: (c.createdAt || '').slice(0, 10),
        time: (c.createdAt || '').slice(11, 16),
        vet: c.vet || 'Dr. Balbi',
        motivo: c.motivoConsulta || c.nota || 'Consulta',
        anamnesis: c.nota || '',
        diagnostico: c.diagnostico || '',
        tratamiento: c.planTratamiento || '',
        peso: parseFloat(c.pesoKg) || 0,
        temp: c.extra?.temp || 38.5,
        fc: c.extra?.fc || 88,
        estado: c.extra?.estado || 'Estable',
      })).sort((a, b) => b.date.localeCompare(a.date));
      setConsultasList(mapped);
      if (mapped.length) setSelected(mapped[0].id);
    }).catch(() => {});
  }, [pet?.id]);

  useEffect(() => {
    const s = consultasList.find(c => c.id === selected) || consultasList[0];
    setAnam(s?.anamnesis || '');
    setDiag(s?.diagnostico || '');
    setTrat(s?.tratamiento || '');
    setVitals({ peso: s?.peso || 0, temp: s?.temp || 38.5, fc: s?.fc || 88, estado: s?.estado || 'Estable' });
  }, [selected, consultasList]);

  const triggerSave = (field) => { setSavedField(field); setTimeout(() => setSavedField(null), 1800); };

  const saveCurrentConsulta = () => {
    setConsultasList(consultasList.map(c => c.id === sel?.id ? { ...c, anamnesis: anam, diagnostico: diag, tratamiento: trat, ...vitals } : c));
    if (sel?.id) {
      window.Auth.put('/consultas/' + sel.id, {
        nota: anam,
        diagnostico: diag,
        planTratamiento: trat,
        pesoKg: vitals.peso || null,
        extra: { temp: vitals.temp, fc: vitals.fc, estado: vitals.estado }
      }).catch(() => {});
    }
    if (pet?.id && vitals.peso) {
      window.Auth.put('/mascotas/' + pet.id, { peso: +vitals.peso }).then(() => {
        window.PETS = (window.PETS || []).map(p => p.id === pet.id ? { ...p, weight: +vitals.peso } : p);
      }).catch(() => {});
    }
    triggerSave('all');
  };

  const addConsultaToList = async (newC) => {
    try {
      const res = await window.Auth.post('/consultas', {
        mascotaID: newC.petId,
        motivoConsulta: newC.motivo,
        vet: newC.vet,
        pesoKg: newC.peso || null,
        extra: { temp: newC.temp, fc: newC.fc, estado: newC.estado }
      });
      const saved = { ...newC, id: res.id };
      setConsultasList(prev => [saved, ...prev]);
      setSelected(saved.id);
    } catch (e) {
      setConsultasList(prev => [newC, ...prev]);
      setSelected(newC.id);
    }
  };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 0, height: '100%', overflow: 'hidden' }}>
      {/* Timeline column */}
      <div style={{ borderRight: '1px solid #EFEAEE', overflow: 'auto', padding: '20px 18px', background: '#FAFAF8' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A' }}>Historia clínica</div>
          <Btn size="sm" icon={<IconPlus />} onClick={() => setShowNewModal(true)}>Nueva</Btn>
        </div>
        <div style={{ position: 'relative', paddingLeft: 18 }}>
          <div style={{ position: 'absolute', left: 6, top: 6, bottom: 6, width: 2, background: '#EFE4EC' }} />
          {consultasList.map((c, i) => (
            <div key={c.id} onClick={() => setSelected(c.id)} style={{
              position: 'relative', padding: '10px 12px', marginBottom: 8, borderRadius: 8, cursor: 'pointer',
              background: selected === c.id ? 'white' : 'transparent',
              border: selected === c.id ? '1px solid #E5C5DC' : '1px solid transparent',
              boxShadow: selected === c.id ? '0 2px 8px rgba(163,0,123,0.06)' : 'none',
            }}>
              <div style={{ position: 'absolute', left: -18, top: 14, width: 14, height: 14, borderRadius: '50%', background: selected === c.id ? '#A3007B' : 'white', border: `2px solid ${selected === c.id ? '#A3007B' : '#D4BFCB'}` }} />
              <div style={{ fontSize: 11, color: '#888', fontWeight: 600 }}>{c.date} · {c.time}</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1A1A1A', marginTop: 2 }}>{c.motivo}</div>
              <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{c.vet}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Detail column */}
      <div style={{ overflow: 'auto', padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 700 }}>{sel?.motivo}</div>
            {isLocked && !isAdmin ? <Pill color="#666">guardada</Pill> : <Pill color="#A3007B">en edición</Pill>}
          </div>
          <div style={{ fontSize: 12, color: '#888' }}>{sel?.date} · {sel?.time} · {sel?.vet}</div>
        </div>
        {/* Vitals strip */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: 0.4 }}>Signos vitales</div>
            {(!isLocked || isAdmin) && <button onClick={() => setEditingVitals(!editingVitals)} style={{ background: 'transparent', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'inherit' }}>
              <IconEdit size={11} /> {editingVitals ? 'Listo' : 'Editar'}
            </button>}
          </div>
          {!editingVitals ? (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <Vital label="Peso" value={`${vitals.peso != null ? vitals.peso : 0} kg`} icon={<IconActivity />} />
              <Vital label="Temperatura" value={`${vitals.temp != null ? vitals.temp : 38.5}°C`} icon={<IconActivity />} />
              <Vital label="FC" value={`${vitals.fc != null ? vitals.fc : 88} bpm`} icon={<IconHeart />} />
              <Vital label="Estado" value={vitals.estado} icon={<IconCheckCircle />} color={vitals.estado === 'Estable' ? '#1F8A5B' : vitals.estado === 'Crítico' ? '#C2185B' : '#D97706'} />
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <Field label="Peso (kg)"><Input type="number" step="0.1" value={vitals.peso} onChange={(e) => setVitals({...vitals, peso: +e.target.value})} /></Field>
              <Field label="Temperatura (°C)"><Input type="number" step="0.1" value={vitals.temp} onChange={(e) => setVitals({...vitals, temp: +e.target.value})} /></Field>
              <Field label="FC (bpm)"><Input type="number" value={vitals.fc} onChange={(e) => setVitals({...vitals, fc: +e.target.value})} /></Field>
              <Field label="Estado">
                <select value={vitals.estado} onChange={(e) => setVitals({...vitals, estado: e.target.value})} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%' }}>
                  <option>Estable</option><option>Observación</option><option>Crítico</option><option>En alta</option>
                </select>
              </Field>
            </div>
          )}
        </div>
        {isLocked && !isAdmin && (
          <div style={{ padding: '10px 14px', background: '#F5F3FF', border: '1px solid #C4B5FD', borderRadius: 8, fontSize: 12.5, color: '#5B21B6', display: 'flex', alignItems: 'center', gap: 8 }}>
            <span>🔒</span> Consulta guardada — solo el administrador puede editarla
          </div>
        )}
        <Field label="Anamnesis" autosaved={savedField === 'anam'}>
          <textarea value={anam} onChange={(e) => { if (!isLocked || isAdmin) { setAnam(e.target.value); triggerSave('anam'); } }} readOnly={isLocked && !isAdmin} rows={3} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5, background: isLocked && !isAdmin ? '#FAFAF8' : 'white' }} onFocus={(e) => { if (!isLocked || isAdmin) e.target.style.borderColor = '#A3007B'; }} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <Field label="Diagnóstico" autosaved={savedField === 'diag'}>
          <textarea value={diag} onChange={(e) => { if (!isLocked || isAdmin) { setDiag(e.target.value); triggerSave('diag'); } }} readOnly={isLocked && !isAdmin} rows={2} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5, background: isLocked && !isAdmin ? '#FAFAF8' : 'white' }} onFocus={(e) => { if (!isLocked || isAdmin) e.target.style.borderColor = '#A3007B'; }} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <Field label="Tratamiento" autosaved={savedField === 'trat'}>
          <textarea value={trat} onChange={(e) => { if (!isLocked || isAdmin) { setTrat(e.target.value); triggerSave('trat'); } }} readOnly={isLocked && !isAdmin} rows={3} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5, background: isLocked && !isAdmin ? '#FAFAF8' : 'white' }} onFocus={(e) => { if (!isLocked || isAdmin) e.target.style.borderColor = '#A3007B'; }} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <div style={{ display: 'flex', gap: 8, paddingTop: 8 }}>
          <Btn variant="secondary" icon={<IconFile />} onClick={() => setAdjuntarModal(true)}>Adjuntar estudio</Btn>
          <Btn variant="secondary" icon={<IconPill />} onClick={() => setRecetaModal(true)}>Generar receta</Btn>
          <div style={{ flex: 1 }} />
          {(!isLocked || isAdmin) && <Btn variant="primary" icon={<IconCheck />} onClick={saveCurrentConsulta}>Guardar consulta</Btn>}
        </div>
      </div>

      {/* Adjuntar estudio modal */}
      {adjuntarModal && (() => {
        const MAX_MB = 50;
        const handleFile = (f) => {
          if (!f) return;
          if (f.size > MAX_MB * 1024 * 1024) { setAdjError(`El archivo supera los ${MAX_MB} MB`); setAdjFile(null); return; }
          const ok = /\.(pdf|jpg|jpeg|png|mp4)$/i.test(f.name);
          if (!ok) { setAdjError('Formato no permitido. Usá PDF, JPG, PNG o MP4.'); setAdjFile(null); return; }
          setAdjError(''); setAdjFile(f);
        };
        const doUpload = async () => {
          if (!adjFile) { setAdjError('Seleccioná un archivo'); return; }
          setAdjUploading(true); setAdjError('');
          try {
            const fd = new FormData();
            fd.append('file', adjFile);
            fd.append('pacienteID', pet.ownerId);
            fd.append('mascotaID', pet.id);
            const r = await fetch(`${window.API_BASE}/files`, { method: 'POST', headers: { Authorization: `Bearer ${window.Auth.getToken()}` }, body: fd });
            if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Error al subir'); }
            const created = await r.json();
            setAdjFiles(prev => [created, ...prev]);
            setAdjFile(null); setAdjuntarModal(false);
          } catch (e) { setAdjError(e.message); }
          setAdjUploading(false);
        };
        return (
        <Modal open={true} onClose={() => { setAdjuntarModal(false); setAdjFile(null); setAdjError(''); }} title="Adjuntar estudio" width={480}
          footer={<><Btn variant="ghost" onClick={() => { setAdjuntarModal(false); setAdjFile(null); setAdjError(''); }}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={doUpload} disabled={adjUploading}>{adjUploading ? 'Subiendo…' : 'Adjuntar'}</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Field label="Archivo (PDF, JPG, PNG, MP4)">
              <label style={{ display: 'block', border: `2px dashed ${adjFile ? '#1F8A5B' : '#E0DCE0'}`, borderRadius: 8, padding: '28px 16px', textAlign: 'center', color: adjFile ? '#1F8A5B' : '#888', fontSize: 13, cursor: 'pointer', background: '#FAFAF8' }}>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png,.mp4" style={{ display: 'none' }} onChange={(e) => handleFile(e.target.files[0])} />
                <div style={{ fontSize: 24, marginBottom: 6 }}>📎</div>
                {adjFile ? <><div style={{ fontWeight: 700 }}>{adjFile.name}</div><div style={{ fontSize: 11, marginTop: 4, color: '#666' }}>{(adjFile.size/1024/1024).toFixed(2)} MB</div></> : <><div>Hacé clic para seleccionar un archivo</div><div style={{ fontSize: 11, marginTop: 4, color: '#AAA' }}>PDF, JPG, PNG, MP4 — máx. {MAX_MB} MB</div></>}
              </label>
            </Field>
            {adjError && <div style={{ fontSize: 12, color: '#C2185B', background: '#FFF0F4', padding: '8px 12px', borderRadius: 8 }}>{adjError}</div>}
            {adjFiles.length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 6 }}>Archivos anteriores</div>
                {adjFiles.slice(0, 5).map(f => (
                  <a key={f.id} href={f.url || '#'} target="_blank" rel="noopener noreferrer" style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 0', borderBottom: '1px solid #F4F0F2', color: '#1A1A1A', textDecoration: 'none', fontSize: 12 }}>
                    <IconFile size={14} /><span style={{ flex: 1 }}>{f.nombreArchivo || 'archivo'}</span><span style={{ color: '#888' }}>{f.tipoArchivo}</span>
                  </a>
                ))}
              </div>
            )}
          </div>
        </Modal>
        );
      })()}

      {/* Generar receta modal */}
      {recetaModal && (
        <Modal open={true} onClose={() => setRecetaModal(false)} title="Generar receta" width={500}
          footer={<><Btn variant="ghost" onClick={() => setRecetaModal(false)}>Cancelar</Btn><Btn variant="primary" icon={<IconFile />} onClick={() => { setRecetaModal(false); }}>Generar PDF</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ padding: 12, background: '#FAF1F7', borderRadius: 8, fontSize: 12.5, color: '#A3007B', fontWeight: 600 }}>
              Paciente: {pet?.name} — {(window.CLIENTS||[]).find(c => c.id === pet?.ownerId)?.name}
            </div>
            <Field label="Medicamento 1"><Input placeholder="Ej. Meloxicam 1.5mg/ml" defaultValue={trat.split('\n')[0] || ''} /></Field>
            <Field label="Dosis y frecuencia"><Input placeholder="0.1 mg/kg SID por 5 días" /></Field>
            <Field label="Medicamento 2 (opcional)"><Input placeholder="Ej. Cefalexina 500mg" /></Field>
            <Field label="Observaciones para el dueño"><textarea rows={2} placeholder="Administrar con comida. Consultar ante efectos adversos." style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none' }} /></Field>
            <div style={{ padding: 10, background: '#F0FDF4', borderRadius: 8, fontSize: 12, color: '#1F8A5B' }}>
              Se generará un PDF con membrete de Dr. Balbi · Emergencias Veterinarias con firma digital.
            </div>
          </div>
        </Modal>
      )}
      {showNewModal && <NewConsultaModal open={true} onClose={() => setShowNewModal(false)} onAdd={addConsultaToList} />}
    </div>
  );
};

const Vital = ({ label, value, icon, color = '#A3007B' }) => (
  <div style={{ background: '#FAFAF8', border: '1px solid #EFEAEE', borderRadius: 10, padding: '10px 12px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: '#888', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
      {React.cloneElement(icon, { size: 12 })}{label}
    </div>
    <div style={{ fontSize: 17, fontWeight: 700, marginTop: 4, color }}>{value}</div>
  </div>
);

// Buscador de mascotas reutilizable — busca por nombre de mascota o dueño
const PetSearchPicker = ({ petId, onSelect, placeholder = 'Buscar mascota o dueño…' }) => {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const inputRef = useRef(null);
  const pet = (window.PETS || []).find(p => p.id === petId);
  const owner = (window.CLIENTS || []).find(c => c.id === pet?.ownerId);

  const results = q.trim().length > 0
    ? (window.PETS || []).filter(p => {
        const o = (window.CLIENTS || []).find(c => c.id === p.ownerId);
        const ql = q.toLowerCase();
        return p.name?.toLowerCase().includes(ql) || o?.name?.toLowerCase().includes(ql);
      }).slice(0, 10)
    : [];

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const openSearch = () => { setOpen(true); setQ(''); setTimeout(() => inputRef.current?.focus(), 0); };
  const pick = (id) => { onSelect(id); setOpen(false); setQ(''); };

  return (
    <div ref={ref} style={{ position: 'relative', width: 300 }}>
      {open ? (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, border: '2px solid #A3007B', borderRadius: 8, padding: '0 12px', height: 36, background: 'white' }}>
          <IconSearch size={14} color="#A3007B" />
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            placeholder={placeholder}
            style={{ border: 'none', outline: 'none', fontSize: 13, fontFamily: 'inherit', flex: 1, background: 'transparent' }} />
          {q && <button onClick={() => setQ('')} style={{ background: 'none', border: 'none', color: '#999', cursor: 'pointer', fontSize: 16, lineHeight: 1, padding: 0 }}>×</button>}
        </div>
      ) : (
        <button onClick={openSearch} style={{ width: '100%', height: 36, display: 'flex', alignItems: 'center', gap: 8, padding: '0 12px', border: '1px solid #E0DCE0', borderRadius: 8, background: 'white', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left' }}>
          <IconSearch size={14} color="#999" />
          <span style={{ flex: 1, fontSize: 13, color: pet ? '#1A1A1A' : '#999', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {pet ? `${pet.name} — ${owner?.name || '?'}` : placeholder}
          </span>
          <span style={{ fontSize: 10, color: '#BBB' }}>▼</span>
        </button>
      )}

      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, background: 'white', border: '1px solid #E0DCE0', borderRadius: 10, boxShadow: '0 6px 20px rgba(0,0,0,0.1)', zIndex: 200, overflow: 'hidden' }}>
          {results.length === 0 ? (
            <div style={{ padding: '20px 16px', textAlign: 'center', color: '#999', fontSize: 13 }}>
              {q.trim() ? 'Sin resultados' : 'Escribí para buscar…'}
            </div>
          ) : results.map(p => {
            const o = (window.CLIENTS || []).find(c => c.id === p.ownerId);
            return (
              <div key={p.id} onClick={() => pick(p.id)}
                style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 14px', cursor: 'pointer', borderBottom: '1px solid #F4F0F2', background: p.id === petId ? '#FAF1F7' : 'white', transition: 'background .1s' }}
                onMouseEnter={e => { if (p.id !== petId) e.currentTarget.style.background = '#FAF7FA'; }}
                onMouseLeave={e => { e.currentTarget.style.background = p.id === petId ? '#FAF1F7' : 'white'; }}>
                <PetAvatar pet={p} size={32} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A' }}>{p.name}</div>
                  <div style={{ fontSize: 11, color: '#888' }}>{p.species || 'Animal'} · {o?.name || 'Sin dueño'}</div>
                </div>
                {p.id === petId && <span style={{ marginLeft: 'auto', fontSize: 10, color: '#A3007B', fontWeight: 700 }}>✓</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};
window.PetSearchPicker = PetSearchPicker;

// ConsultasView wrapper - pick patient first or open timeline
const ConsultasView = () => {
  const [petId, setPetId] = useState(() => { const id = window._CONSULTAS_PET_ID || window._SELECTED_PET_ID || null; window._CONSULTAS_PET_ID = null; return id; });
  const [newConsulta, setNewConsulta] = useState(() => { const v = window._CONSULTAS_OPEN_MODAL || false; window._CONSULTAS_OPEN_MODAL = false; return v; });
  React.useEffect(() => { if (petId) window._SELECTED_PET_ID = petId; }, [petId]);
  const [refreshKey, setRefreshKey] = useState(0);
  const pet = (window.PETS||[]).find(p => p.id === petId);
  const handleAdd = async (newC) => {
    try {
      await window.Auth.post('/consultas', { mascotaID: newC.petId, motivoConsulta: newC.motivo, vet: newC.vet, pesoKg: newC.peso || null, extra: { temp: newC.temp, fc: newC.fc, estado: newC.estado } });
      setRefreshKey(k => k + 1);
    } catch {}
  };
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '14px 24px', borderBottom: '1px solid #EFEAEE', display: 'flex', gap: 12, alignItems: 'center', background: 'white' }}>
        <PetAvatar pet={pet} size={40} />
        <div>
          <div style={{ fontSize: 15, fontWeight: 700 }}>{pet?.name || 'Seleccioná un paciente'}</div>
          <div style={{ fontSize: 12, color: '#888' }}>{pet ? `${pet.species || ''} · ${pet.breed || ''} · ${(window.CLIENTS||[]).find(c => c.id === pet.ownerId)?.name || ''}` : 'Buscá por nombre de mascota o dueño'}</div>
        </div>
        <div style={{ flex: 1 }} />
        <PetSearchPicker petId={petId} onSelect={setPetId} />
      </div>
      <div style={{ flex: 1, overflow: 'hidden' }}>
        {pet
          ? <ConsultaTimeline key={`${petId}-${refreshKey}`} pet={pet} openNewConsulta={() => setNewConsulta(true)} />
          : <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: 12, color: '#999' }}>
              <IconSearch size={40} color="#E0DCE0" />
              <div style={{ fontSize: 15, fontWeight: 600, color: '#BBB' }}>Buscá una mascota para ver su historia clínica</div>
              <div style={{ fontSize: 13, color: '#CCC' }}>Podés buscar por nombre de la mascota o del dueño</div>
            </div>
        }
      </div>
      <NewConsultaModal open={newConsulta} onClose={() => setNewConsulta(false)} onAdd={handleAdd} initialPetId={petId} />
    </div>
  );
};

window.ConsultasView = ConsultasView;

</script>


<script type="text/babel">
// Libreta sanitaria - tarjetas categorizadas
const PetSearchPicker = window.PetSearchPicker;
const LIBRETA_CATS_TEMPLATE = [
  { id: 'vacunas',          label: 'Vacunas',           icon: IconSyringe,  color: '#A3007B' },
  { id: 'antiparasitarios', label: 'Antiparasitarios',  icon: IconShield,   color: '#1F8A5B' },
  { id: 'cirugias',         label: 'Cirugías',           icon: IconScissors, color: '#7A3FBF' },
  { id: 'estudios',         label: 'Estudios',           icon: IconFile,     color: '#2D5BA0' },
  { id: 'medicacion',       label: 'Medicación',         icon: IconPill,     color: '#D97706' },
  { id: 'alergias',         label: 'Alergias',           icon: IconAlert,    color: '#C2185B' },
];

const LibretaView = () => {
  const [petId, setPetId] = useState(() => { const id = window._LIBRETA_PET_ID || window._SELECTED_PET_ID || null; window._LIBRETA_PET_ID = null; return id; });
  React.useEffect(() => { if (petId) window._SELECTED_PET_ID = petId; }, [petId]);
  const pet = (window.PETS || []).find(p => p.id === petId);
  const owner = (window.CLIENTS || []).find(c => c.id === pet?.ownerId);
  const [open, setOpen] = useState('vacunas');
  const [addModal, setAddModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [cats, setCats] = useState(LIBRETA_CATS_TEMPLATE.map(c => ({ ...c, items: [], count: 0 })));
  const [formData, setFormData] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if (!petId) return;
    setLoading(true);
    window.Auth.get('/libreta?mascotaID=' + petId).then(res => {
      const items = Array.isArray(res) ? res : (res.data || []);
      setCats(LIBRETA_CATS_TEMPLATE.map(cat => {
        const ci = items.filter(i => i.categoria === cat.id);
        return { ...cat, count: ci.length, items: ci.map(i => ({ _id: i.id, name: i.nombre, date: i.fecha || '', proxima: i.proxima || '', status: i.status || 'vigente', notas: i.notas || '' })) };
      }));
    }).catch(() => {}).finally(() => setLoading(false));
  }, [petId]);

  const syncAlergias = (newCats) => {
    if (!petId) return;
    const names = (newCats.find(c => c.id === 'alergias')?.items || []).map(i => i.name);
    const alergias = names.length ? names.join(', ') : 'Ninguna';
    window.Auth.put('/mascotas/' + petId, { alergias }).catch(() => {});
    window.PETS = (window.PETS || []).map(p => p.id === petId ? { ...p, alergias } : p);
  };

  const handleAddItem = async () => {
    if (!formData || !formData.name) return;
    try {
      const res = await window.Auth.post('/libreta', {
        mascotaID: petId, categoria: addModal.catId, nombre: formData.name,
        fecha: formData.date || null, proxima: formData.proxima || null,
        status: formData.status || 'vigente', notas: formData.notas || null
      });
      const newItem = { _id: res.id, name: res.nombre, date: res.fecha || '', proxima: res.proxima || '', status: res.status || 'vigente', notas: res.notas || '' };
      const newCats = cats.map(c => c.id === addModal.catId ? { ...c, items: [...c.items, newItem], count: c.count + 1 } : c);
      setCats(newCats);
      if (addModal.catId === 'alergias') syncAlergias(newCats);
    } catch (e) { console.error('Error guardando:', e); }
    setAddModal(null); setFormData(null);
  };

  const handleEditItem = async () => {
    if (!formData || !editModal) return;
    try {
      await window.Auth.put('/libreta/' + editModal.itemId, {
        nombre: formData.name, fecha: formData.date || null,
        proxima: formData.proxima || null, status: formData.status, notas: formData.notas || null
      });
      const newCats = cats.map(c => c.id === editModal.catId ? { ...c, items: c.items.map((it, i) => i === editModal.idx ? { ...it, ...formData } : it) } : c);
      setCats(newCats);
      if (editModal.catId === 'alergias') syncAlergias(newCats);
    } catch (e) { console.error('Error editando:', e); }
    setEditModal(null); setFormData(null);
  };

  const handleDeleteItem = async (catId, idx, itemId) => {
    try {
      await window.Auth.del('/libreta/' + itemId);
      const newCats = cats.map(c => c.id === catId ? { ...c, items: c.items.filter((_, i) => i !== idx), count: c.count - 1 } : c);
      setCats(newCats);
      if (catId === 'alergias') syncAlergias(newCats);
    } catch (e) { console.error('Error eliminando:', e); }
    setEditModal(null);
  };

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 18, overflow: 'auto', flex: 1 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px', background: 'white', border: '1px solid #EFEAEE', borderRadius: 12 }}>
        <PetAvatar pet={pet} size={44} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 16, fontWeight: 700 }}>{pet?.name || 'Seleccioná un paciente'} <span style={{ color: '#888', fontWeight: 500, fontSize: 14 }}>{owner ? `· ${owner.name}` : ''}</span></div>
          <div style={{ fontSize: 12, color: '#888' }}>{pet ? `${pet.species || ''} · ${pet.breed || ''} · ${pet.weight || 0}kg` : 'Usá el selector para elegir un paciente'}</div>
        </div>
        {PetSearchPicker && <PetSearchPicker petId={petId} onSelect={(id) => { window._LIBRETA_PET_ID = id; setPetId(id); }} />}
      </div>

      {loading ? (
        <div style={{ textAlign: 'center', padding: 40, color: '#888', fontSize: 13 }}>Cargando libreta...</div>
      ) : !petId ? (
        <div style={{ textAlign: 'center', padding: 40, color: '#888', fontSize: 13 }}>Seleccioná un paciente para ver su libreta sanitaria.</div>
      ) : (
        <>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
            {cats.map(cat => {
              const I = cat.icon;
              const isOpen = open === cat.id;
              return (
                <div key={cat.id} onClick={() => setOpen(cat.id)} style={{
                  background: 'white', borderRadius: 12, padding: 16, cursor: 'pointer',
                  border: `1px solid ${isOpen ? cat.color : '#EFEAEE'}`,
                  boxShadow: isOpen ? `0 4px 16px ${cat.color}1a` : 'none',
                  transition: 'all .15s',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: cat.color + '14', color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I size={18} /></div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: '#1A1A1A' }}>{cat.count}</div>
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{cat.label}</div>
                  <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{cat.count === 0 ? 'Sin registros' : `${cat.count} ${cat.count === 1 ? 'registro' : 'registros'}`}</div>
                </div>
              );
            })}
          </div>

          {(() => {
            const cat = cats.find(c => c.id === open);
            const I = cat.icon;
            return (
              <div style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, padding: 20 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: cat.color + '14', color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I size={16} /></div>
                    <div style={{ fontSize: 15, fontWeight: 700 }}>{cat.label}</div>
                  </div>
                  <Btn size="sm" icon={<IconPlus />} onClick={() => { setFormData({ name: '', date: window.todayAR ? window.todayAR() : new Date().toISOString().slice(0,10), proxima: '', status: 'vigente' }); setAddModal({ catId: cat.id, catLabel: cat.label, catColor: cat.color }); }}>Agregar</Btn>
                </div>
                {cat.items.length === 0 ? (
                  <div style={{ padding: '32px 0', textAlign: 'center', color: '#888', fontSize: 13 }}>Sin registros para esta categoría</div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {cat.items.map((it, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '12px 14px', background: '#FAFAF8', borderRadius: 10 }}>
                        <div style={{ width: 6, height: 36, borderRadius: 4, background: cat.color }} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13.5, fontWeight: 600 }}>{it.name}</div>
                          <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{it.date ? `Fecha: ${it.date}` : ''}{it.proxima ? ` · Próxima: ${it.proxima}` : ''}</div>
                        </div>
                        <Pill color={it.status === 'vigente' || it.status === 'normal' || it.status === 'completada' || it.status === 'activa' ? '#1F8A5B' : it.status === 'proxima' ? '#D97706' : it.status === 'vencido' || it.status === 'vencida' ? '#C2185B' : '#888'}>
                          {it.status}
                        </Pill>
                        <button onClick={() => { setFormData({...it}); setEditModal({ catId: cat.id, catLabel: cat.label, catColor: cat.color, idx: i, itemId: it._id }); }} style={{ background: 'transparent', border: '1px solid #EFEAEE', borderRadius: 6, color: '#666', cursor: 'pointer', padding: 6, display: 'flex' }}><IconEdit size={14} /></button>
                        <button onClick={() => handleDeleteItem(cat.id, i, it._id)} style={{ background: 'transparent', border: '1px solid #F2D5E2', borderRadius: 6, color: '#C2185B', cursor: 'pointer', padding: 6, display: 'flex' }}><IconTrash size={14} /></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}
        </>
      )}

      {addModal && formData && (
        <Modal open={true} onClose={() => { setAddModal(null); setFormData(null); }} title={`Agregar · ${addModal.catLabel}`} width={460}
          footer={<><Btn variant="ghost" onClick={() => { setAddModal(null); setFormData(null); }}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={handleAddItem} disabled={!formData.name}>Guardar</Btn></>}>
          <LibretaForm catId={addModal.catId} catColor={addModal.catColor} data={formData} onChange={setFormData} />
        </Modal>
      )}

      {editModal && formData && (
        <Modal open={true} onClose={() => { setEditModal(null); setFormData(null); }} title={`Editar · ${editModal.catLabel}`} width={460}
          footer={<>
            <Btn variant="danger" icon={<IconTrash />} onClick={() => handleDeleteItem(editModal.catId, editModal.idx, editModal.itemId)} style={{ marginRight: 'auto' }}>Eliminar</Btn>
            <Btn variant="ghost" onClick={() => { setEditModal(null); setFormData(null); }}>Cancelar</Btn>
            <Btn variant="primary" icon={<IconCheck />} onClick={handleEditItem} disabled={!formData.name}>Guardar</Btn>
          </>}>
          <LibretaForm catId={editModal.catId} catColor={editModal.catColor} data={formData} onChange={setFormData} />
        </Modal>
      )}
    </div>
  );
};

const LibretaForm = ({ catId, catColor, data, onChange }) => {
  const needsProxima = ['vacunas','antiparasitarios'].includes(catId);
  const statusOpts = {
    vacunas: ['vigente','proxima','vencida'],
    antiparasitarios: ['vigente','vencido'],
    cirugias: ['completada','programada'],
    estudios: ['normal','alterado','pendiente'],
    medicacion: ['activa','finalizada'],
    alergias: ['confirmada','sospechada'],
  }[catId] || ['vigente'];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <Field label="Nombre / descripción">
        <Input autoFocus placeholder="Ej. Séxtuple Nobivac" value={data.name || ''} onChange={(e) => onChange({...data, name: e.target.value})} />
      </Field>
      <div style={{ display: 'grid', gridTemplateColumns: needsProxima ? '1fr 1fr' : '1fr', gap: 10 }}>
        <Field label="Fecha"><Input type="date" value={data.date || ''} onChange={(e) => onChange({...data, date: e.target.value})} /></Field>
        {needsProxima && <Field label="Próxima (opcional)"><Input type="date" value={data.proxima || ''} onChange={(e) => onChange({...data, proxima: e.target.value || null})} /></Field>}
      </div>
      <Field label="Estado">
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {statusOpts.map(s => (
            <button key={s} onClick={() => onChange({...data, status: s})} style={{ padding: '6px 14px', borderRadius: 8, border: data.status === s ? `2px solid ${catColor}` : '1px solid #E0DCE0', background: data.status === s ? catColor + '14' : 'white', color: data.status === s ? catColor : '#666', fontWeight: data.status === s ? 700 : 500, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, textTransform: 'capitalize' }}>{s}</button>
          ))}
        </div>
      </Field>
    </div>
  );
};

window.LibretaView = LibretaView;

</script>


<script type="text/babel">
// Mensajes — WhatsApp real via Kapso
const MensajesView = ({ initialClientId }) => {
  const [convs, setConvs] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [draft, setDraft] = useState('');
  const [search, setSearch] = useState('');
  const [loadingConvs, setLoadingConvs] = useState(true);
  const [loadingMsgs, setLoadingMsgs] = useState(false);
  const [waError, setWaError] = useState(null);
  const [showEmoji, setShowEmoji] = useState(false);
  const [sending, setSending] = useState(false);
  const bottomRef = React.useRef(null);

  const activePac = convs.find(c => c.id === activeId);

  // Cargar lista de pacientes con WhatsApp vinculado
  useEffect(() => {
    if (!window.Auth?.getToken()) return;
    window.Auth.get('/chat/pacientes?limit=100').then(res => {
      const rows = res.data || [];
      setConvs(rows);
      const preSelect = initialClientId ? rows.find(r => r.id === initialClientId) : null;
      if (preSelect) setActiveId(preSelect.id);
      else if (rows.length > 0) setActiveId(rows[0].id);
      setLoadingConvs(false);
    }).catch(() => {
      setWaError('No se pudo conectar con el servidor');
      setLoadingConvs(false);
    });
  }, []);

  // Cargar mensajes del paciente seleccionado
  useEffect(() => {
    if (!activeId || !activePac?.kapso_phone_number_id) return;
    setLoadingMsgs(true);
    setMessages([]);
    setWaError(null);
    const pid = encodeURIComponent(activePac.kapso_phone_number_id);
    const cid = activePac.kapso_conversation_id ? '&conversation_id=' + encodeURIComponent(activePac.kapso_conversation_id) : '';
    window.Auth.get(`/chat/mensajes?phone_number_id=${pid}${cid}&limit=50`).then(res => {
      setMessages(res.data || []);
      setLoadingMsgs(false);
    }).catch(e => {
      const code = (e?.message || '').match(/\d+/)?.[0];
      if (code === '500') setWaError('KAPSO_API_KEY no configurada. Revisá el archivo .env del servidor.');
      else setWaError('Error al cargar mensajes');
      setLoadingMsgs(false);
    });
  }, [activeId]);

  // Scroll al fondo con nuevos mensajes
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = new Date(parseInt(ts) * 1000);
    return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  };

  const send = async () => {
    if (!draft.trim() || !activePac || sending) return;
    const text = draft.trim();
    setDraft('');
    const tmpId = 'tmp-' + Date.now();
    setMessages(prev => [...prev, { id: tmpId, type: 'TEXT', direction: 'outbound', text, timestamp: String(Math.floor(Date.now() / 1000)) }]);
    setSending(true);
    try {
      await window.Auth.post('/chat/mensajes', { phone_number_id: activePac.kapso_phone_number_id, to: activePac.telefono, text });
    } catch {
      setMessages(prev => prev.filter(m => m.id !== tmpId));
      setDraft(text);
    } finally { setSending(false); }
  };

  const sendMedia = async (file) => {
    if (!activePac) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const icons = { pdf: '📄', doc: '📝', docx: '📝', mp4: '🎥', mov: '🎥', xlsx: '📊', pptx: '📊', jpg: '🖼', jpeg: '🖼', png: '🖼' };
    const isImage = ['jpg','jpeg','png','gif','webp'].includes(ext);
    const kb = (file.size / 1024).toFixed(0);
    const tmpId = 'tmp-' + Date.now();
    setMessages(prev => [...prev, { id: tmpId, type: isImage ? 'IMAGE' : 'DOCUMENT', direction: 'outbound', text: file.name, timestamp: String(Math.floor(Date.now() / 1000)), _icon: icons[ext] || '📎', _size: kb + ' KB' }]);
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('pacienteID', String(activePac.id));
      const uploadRes = await fetch(`${window.API_BASE}/files`, { method: 'POST', headers: { Authorization: `Bearer ${window.Auth.getToken()}` }, body: formData });
      if (uploadRes.ok) {
        const up = await uploadRes.json();
        if (up.url) {
          await window.Auth.post('/chat/mensajes', { phone_number_id: activePac.kapso_phone_number_id, to: activePac.telefono, type: isImage ? 'image' : 'document', mediaUrl: up.url, fileName: file.name, caption: file.name });
        }
      }
    } catch {}
  };

  const filtered = convs.filter(c => !search.trim() || (c.nombre || '').toLowerCase().includes(search.toLowerCase()) || (c.telefono || '').includes(search));

  // Estado: sin WhatsApp configurado o sin conversaciones
  if (!loadingConvs && convs.length === 0) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14, padding: 48 }}>
        <div style={{ fontSize: 52, opacity: 0.2 }}>💬</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: '#1A1A1A' }}>WhatsApp no conectado</div>
        <div style={{ fontSize: 13, color: '#888', textAlign: 'center', lineHeight: 1.8, maxWidth: 380 }}>
          {waError || 'No hay clientes con WhatsApp vinculado aún.'}<br/>
          Para activar, configurá las credenciales en <code style={{ background: '#F4F0F2', padding: '1px 6px', borderRadius: 4, fontSize: 12 }}>.env</code>:
        </div>
        <div style={{ background: '#1A1A1A', color: '#CDE', borderRadius: 10, padding: '14px 20px', fontSize: 12, fontFamily: 'ui-monospace, monospace', lineHeight: 2.2, width: '100%', maxWidth: 380 }}>
          <div style={{ color: '#777' }}># .env</div>
          <div>KAPSO_API_KEY=<span style={{ color: '#7FDFB0' }}>tu_clave_aquí</span></div>
          <div>WHATSAPP_ID=<span style={{ color: '#7FDFB0' }}>tu_numero_id</span></div>
        </div>
        <div style={{ fontSize: 12, color: '#AAA', textAlign: 'center', maxWidth: 380, lineHeight: 1.7 }}>
          Luego vinculá el número de WhatsApp de cada cliente desde su ficha en <strong>Clientes</strong>.
        </div>
      </div>
    );
  }

  if (loadingConvs) {
    return <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><div style={{ fontSize: 13, color: '#BBB' }}>Cargando conversaciones…</div></div>;
  }

  return (
    <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '320px 1fr', overflow: 'hidden', background: 'white' }}>
      {/* Lista de conversaciones */}
      <div style={{ borderRight: '1px solid #EFEAEE', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ padding: '14px 16px', borderBottom: '1px solid #EFEAEE' }}>
          <Input icon={<IconSearch />} placeholder="Buscar por nombre o teléfono…" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
        <div style={{ flex: 1, overflow: 'auto' }}>
          {filtered.length === 0 && <div style={{ padding: '40px 16px', textAlign: 'center', color: '#999', fontSize: 13 }}>Sin resultados</div>}
          {filtered.map(p => {
            const isActive = activeId === p.id;
            return (
              <div key={p.id} onClick={() => setActiveId(p.id)} style={{ padding: '12px 16px', display: 'flex', gap: 10, cursor: 'pointer', background: isActive ? '#FAF1F7' : 'white', borderLeft: isActive ? '3px solid #A3007B' : '3px solid transparent', transition: 'background .1s' }}
                onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = '#FAFAF8'; }}
                onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = 'white'; }}>
                <div style={{ position: 'relative' }}>
                  <Avatar name={p.nombre || ''} size={42} />
                  <div style={{ position: 'absolute', bottom: 0, right: 0, width: 11, height: 11, background: '#25D366', borderRadius: '50%', border: '2px solid white' }} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <span style={{ fontSize: 13.5, fontWeight: 600 }}>{p.nombre}</span>
                    <span style={{ fontSize: 10, color: '#25D366', fontWeight: 700 }}>WA</span>
                  </div>
                  <div style={{ fontSize: 12, color: '#888', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.telefono || 'Sin teléfono'}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Panel de chat */}
      <div style={{ display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#FAF7FA' }}>
        {activePac ? (
          <>
            <div style={{ padding: '12px 20px', borderBottom: '1px solid #EFEAEE', display: 'flex', alignItems: 'center', gap: 12, background: 'white' }}>
              <Avatar name={activePac.nombre || ''} size={40} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{activePac.nombre}</div>
                <div style={{ fontSize: 11, color: '#25D366', display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ width: 6, height: 6, background: '#25D366', borderRadius: '50%' }} /> WhatsApp · {activePac.telefono || '—'}
                </div>
              </div>
            </div>
            <div style={{ flex: 1, overflow: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
              {loadingMsgs && <div style={{ textAlign: 'center', fontSize: 12, color: '#BBB', padding: 24 }}>Cargando mensajes…</div>}
              {waError && !loadingMsgs && (
                <div style={{ textAlign: 'center', fontSize: 12, color: '#D97706', background: '#FFF9F0', border: '1px solid #FFE4B0', borderRadius: 8, padding: '10px 16px', margin: '8px 0' }}>
                  ⚠️ {waError}
                </div>
              )}
              {!loadingMsgs && !waError && messages.length === 0 && (
                <div style={{ textAlign: 'center', fontSize: 12, color: '#BBB', padding: 40 }}>Sin mensajes aún</div>
              )}
              {messages.map((m, i) => {
                const isMe = m.direction === 'outbound';
                const isMedia = m.type === 'IMAGE' || m.type === 'DOCUMENT' || m._icon;
                return (
                  <div key={m.id || i} style={{ display: 'flex', justifyContent: isMe ? 'flex-end' : 'flex-start' }}>
                    <div style={{ maxWidth: '60%', padding: isMedia ? 4 : '10px 14px', borderRadius: 14, background: isMe ? '#A3007B' : 'white', color: isMe ? 'white' : '#1A1A1A', fontSize: 13.5, lineHeight: 1.5, borderTopLeftRadius: !isMe ? 4 : 14, borderTopRightRadius: isMe ? 4 : 14, boxShadow: !isMe ? '0 1px 2px rgba(0,0,0,0.04)' : 'none' }}>
                      {m.type === 'IMAGE' && m.imageUrl ? (
                        <img src={m.imageUrl} style={{ maxWidth: 200, borderRadius: 10, display: 'block' }} alt="imagen" onError={(e) => { e.target.style.display='none'; }} />
                      ) : m.type === 'IMAGE' && !m.imageUrl ? (
                        <div style={{ width: 200, height: 120, borderRadius: 10, background: '#E5E0E5', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#888', fontSize: 22 }}>🖼</div>
                      ) : (m.type === 'DOCUMENT' || m._icon) ? (
                        <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, borderRadius: 10, background: isMe ? 'rgba(255,255,255,0.15)' : '#F4F0F2', minWidth: 180 }}>
                          <div style={{ fontSize: 24 }}>{m._icon || '📎'}</div>
                          <div><div style={{ fontSize: 12.5, fontWeight: 600 }}>{m.text || 'archivo'}</div><div style={{ fontSize: 10, opacity: 0.7 }}>{m._size || (m.documentUrl ? 'documento' : '')}</div></div>
                          {m.documentUrl && <a href={m.documentUrl} target="_blank" rel="noreferrer" style={{ marginLeft: 'auto', color: isMe ? 'rgba(255,255,255,0.8)' : '#A3007B', fontSize: 10, fontWeight: 600, textDecoration: 'none' }}>Ver</a>}
                        </div>
                      ) : m.type === 'AUDIO' ? (
                        <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 8, minWidth: 160 }}>
                          <span>🎙</span><span style={{ fontSize: 12 }}>{m.transcript || m.text || 'Audio'}</span>
                        </div>
                      ) : (m.text || '')}
                      <div style={{ fontSize: 10, opacity: 0.7, marginTop: 3, textAlign: 'right', padding: isMedia ? '0 8px 4px' : 0 }}>
                        {formatTime(m.timestamp)} {isMe && '✓✓'}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div ref={bottomRef} />
            </div>
            {/* Barra de input */}
            <div style={{ padding: '10px 14px', borderTop: '1px solid #EFEAEE', background: 'white' }}>
              {showEmoji && (
                <div style={{ marginBottom: 8, padding: '10px 12px', background: '#FAF7FA', borderRadius: 12, border: '1px solid #EFEAEE', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {['😊','😂','🙏','❤️','👍','🐾','🐕','🐈','💊','✅','⚠️','📋','🔔','👋','😔','🤗','💪','🎉','😅','🥰'].map(e => (
                    <button key={e} onClick={() => { setDraft(d => d + e); setShowEmoji(false); }} style={{ background: 'transparent', border: 'none', fontSize: 22, cursor: 'pointer', padding: 2, borderRadius: 4, lineHeight: 1 }}>{e}</button>
                  ))}
                </div>
              )}
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <label title="Adjuntar documento" style={{ cursor: 'pointer', color: '#888', display: 'flex', padding: 6 }}>
                  <input type="file" accept=".pdf,.doc,.docx,.mp4,.mov,.xlsx,.pptx" style={{ display: 'none' }} onChange={(e) => { const f = e.target.files[0]; if (!f) return; sendMedia(f); e.target.value = ''; }} />
                  <IconPaperclip size={20} />
                </label>
                <label title="Enviar imagen" style={{ cursor: 'pointer', color: '#888', display: 'flex', padding: 6 }}>
                  <input type="file" accept="image/jpeg,image/png,image/webp" style={{ display: 'none' }} onChange={(e) => { const f = e.target.files[0]; if (!f) return; sendMedia(f); e.target.value = ''; }} />
                  <IconImage size={20} />
                </label>
                <button onClick={() => setShowEmoji(v => !v)} style={{ background: showEmoji ? '#FAF1F7' : 'transparent', border: 'none', color: showEmoji ? '#A3007B' : '#888', cursor: 'pointer', padding: 6, display: 'flex', borderRadius: 6 }}><IconSmile size={20} /></button>
                <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && send()} placeholder="Escribir mensaje…" style={{ flex: 1, height: 38, padding: '0 14px', border: '1px solid #E0DCE0', borderRadius: 999, fontSize: 13.5, fontFamily: 'inherit', outline: 'none' }} />
                <button onClick={send} disabled={sending || !draft.trim()} style={{ width: 40, height: 40, borderRadius: '50%', background: '#A3007B', color: 'white', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: sending || !draft.trim() ? 0.5 : 1 }}><IconSend size={18} /></button>
              </div>
            </div>
          </>
        ) : (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ fontSize: 13, color: '#BBB' }}>Seleccioná una conversación</div>
          </div>
        )}
      </div>
    </div>
  );
};

window.MensajesView = MensajesView;

</script>


<script type="text/babel">
// Agenda - Google Calendar style with drag-and-drop
const HOURS = Array.from({ length: 12 }, (_, i) => 8 + i); // 8..19
const DAYS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
// Semana dinámica basada en la fecha actual (Argentina UTC-3)
function getWeekDates() {
  const todayStr = window.todayAR ? window.todayAR() : new Date().toISOString().slice(0, 10);
  const todayUTC = new Date(todayStr + 'T00:00:00Z');
  const dow = todayUTC.getUTCDay();
  const monday = new Date(todayUTC);
  monday.setUTCDate(todayUTC.getUTCDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setUTCDate(monday.getUTCDate() + i);
    return d.toISOString().slice(0, 10);
  });
}
const _WEEK_DATES = getWeekDates();
const DAY_NUMS = _WEEK_DATES.map(d => parseInt(d.slice(8)));
const TODAY_IDX = _WEEK_DATES.findIndex(d => d === (window.todayAR ? window.todayAR() : new Date().toISOString().slice(0, 10)));
const WEEK_TURNOS = [];

const NuevoTurnoModal = ({ onClose, onSave, editId }) => {
  const hoy = window.todayAR ? window.todayAR() : new Date().toISOString().slice(0, 10);
  const [data, setData] = useState({ mascotaID: '', profesionalID: '', servicioID: '', fecha: hoy, hora: '09:00', duracion: 30, notas: '' });
  const [profesionales, setProfesionales] = useState([]);
  const [servicios, setServicios] = useState([]);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const selStyle = { height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%', background: 'white' };

  useEffect(() => {
    window.Auth.get('/profesionales').then(r => setProfesionales(Array.isArray(r) ? r : (r.data || []))).catch(() => {});
    window.Auth.get('/servicios').then(r => setServicios(Array.isArray(r) ? r : (r.data || []))).catch(() => {});
    if (editId) {
      window.Auth.get('/turnos/' + editId).then(t => {
        const start = new Date(t.horaInicio);
        const end = new Date(t.horaFin);
        const dur = Math.max(15, Math.round((end - start) / 60000));
        const hora = `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
        const fecha = (t.horaInicio || '').slice(0, 10);
        setData({ mascotaID: t.mascotaID || '', profesionalID: t.profesionalID || '', servicioID: t.servicioID || '', fecha, hora, duracion: dur, notas: t.notas || '' });
      }).catch(() => {});
    }
  }, []);

  const handleSave = async () => {
    if (!data.profesionalID || !data.servicioID) { setError('Seleccioná profesional y servicio'); return; }
    setSaving(true); setError('');
    const horaInicio = `${data.fecha}T${data.hora}:00-03:00`;
    const totalMin = parseInt(data.hora.split(':')[0]) * 60 + parseInt(data.hora.split(':')[1]) + parseInt(data.duracion);
    const horaFin = `${data.fecha}T${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}:00-03:00`;
    try {
      const payload = { profesionalID: parseInt(data.profesionalID), servicioID: parseInt(data.servicioID), mascotaID: data.mascotaID ? parseInt(data.mascotaID) : null, horaInicio, horaFin, notas: data.notas || undefined };
      const res = editId
        ? await window.Auth.put('/turnos/' + editId, payload)
        : await window.Auth.post('/turnos', { ...payload, estado: 'RESERVADO' });
      onSave(res);
      onClose();
    } catch(e) {
      setError(editId ? 'Error al actualizar turno.' : 'Error al crear turno. Verificá los datos.');
      setSaving(false);
    }
  };

  return (
    <Modal open={true} onClose={onClose} title={editId ? 'Editar turno' : 'Nuevo turno'} width={500}
      footer={<><Btn variant="ghost" onClick={onClose}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={handleSave} disabled={saving || !data.profesionalID || !data.servicioID}>{saving ? 'Guardando…' : editId ? 'Guardar cambios' : 'Agendar turno'}</Btn></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {error && <div style={{ padding: '8px 12px', background: '#FEF2F4', borderRadius: 8, fontSize: 13, color: '#C2185B', fontWeight: 600 }}>{error}</div>}
        <Field label="Mascota">
          <select value={data.mascotaID} onChange={(e) => setData({...data, mascotaID: e.target.value})} style={selStyle}>
            <option value="">Sin mascota asociada</option>
            {(window.PETS||[]).map(p => { const o = (window.CLIENTS||[]).find(c => c.id === p.ownerId); return <option key={p.id} value={p.id}>{p.name} — {o?.name || ''}</option>; })}
          </select>
        </Field>
        <Field label="Profesional *">
          <select value={data.profesionalID} onChange={(e) => setData({...data, profesionalID: e.target.value})} style={selStyle}>
            <option value="">Seleccionar profesional</option>
            {profesionales.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </Field>
        <Field label="Servicio *">
          <select value={data.servicioID} onChange={(e) => setData({...data, servicioID: e.target.value})} style={selStyle}>
            <option value="">Seleccionar servicio</option>
            {servicios.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
          </select>
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
          <Field label="Fecha"><Input type="date" value={data.fecha} onChange={(e) => setData({...data, fecha: e.target.value})} /></Field>
          <Field label="Hora"><Input type="time" value={data.hora} onChange={(e) => setData({...data, hora: e.target.value})} /></Field>
          <Field label="Duración (min)">
            <select value={data.duracion} onChange={(e) => setData({...data, duracion: +e.target.value})} style={selStyle}>
              <option value={15}>15 min</option><option value={30}>30 min</option><option value={45}>45 min</option><option value={60}>60 min</option><option value={90}>90 min</option>
            </select>
          </Field>
        </div>
        <Field label="Notas (opcional)">
          <Input placeholder="Observaciones del turno…" value={data.notas} onChange={(e) => setData({...data, notas: e.target.value})} />
        </Field>
      </div>
    </Modal>
  );
};

const AgendaView = () => {
  const [view, setView] = useState('semana');
  const [turnos, setTurnos] = useState(WEEK_TURNOS);
  const [drag, setDrag] = useState(null);
  const [hover, setHover] = useState(null);
  const [selected, setSelected] = useState(null);
  const [nuevoTurno, setNuevoTurno] = useState(false);
  const [editTurno, setEditTurno] = useState(null);


  // Carga turnos desde la API al montar
  useEffect(() => {
    window.Auth.get('/turnos').then(res => {
      const raw = res.data || res || [];
      const mapped = raw.map(t => {
        const startDate = (t.horaInicio || '').slice(0, 10);
        const dayIdx = _WEEK_DATES.indexOf(startDate);
        if (dayIdx === -1) return null;
        const start = new Date(t.horaInicio);
        const end   = new Date(t.horaFin);
        const time  = start.getHours() + start.getMinutes() / 60;
        const dur   = Math.max(0.25, (end - start) / 3600000);
        return {
          id:     t.id,
          day:    dayIdx,
          time,
          dur,
          petId:  t.mascotaID,
          motivo: t.notas || t.servicio?.nombre || 'Consulta',
          vet:    t.profesional?.nombre || 'Dr. Balbi',
          color:  t.profesional?.color  || '#A3007B',
          fecha:  startDate,
        };
      }).filter(Boolean);
      setTurnos(mapped);
    }).catch(() => {});
  }, []);
  const onDragStart = (t) => setDrag(t);
  const onDrop = (day, time) => {
    if (!drag) return;
    setTurnos(turnos.map(t => t.id === drag.id ? { ...t, day, time } : t));
    setDrag(null); setHover(null);
    const fecha = _WEEK_DATES[day];
    if (fecha && drag.id) {
      const hH = String(Math.floor(time)).padStart(2, '0');
      const hM = (time % 1) ? '30' : '00';
      const horaInicio = `${fecha}T${hH}:${hM}:00-03:00`;
      const durMin = Math.round((drag.dur || 0.5) * 60);
      const totalMin = Math.floor(time) * 60 + (time % 1 ? 30 : 0) + durMin;
      const horaFin = `${fecha}T${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}:00-03:00`;
      window.Auth.put('/turnos/' + drag.id, { horaInicio, horaFin }).catch(() => {});
    }
  };

  const addTurno = async (savedTurno) => {
    const startDate = (savedTurno.horaInicio || '').slice(0, 10);
    const dayIdx = _WEEK_DATES.indexOf(startDate);
    if (dayIdx === -1) return;
    const start = new Date(savedTurno.horaInicio);
    const end   = new Date(savedTurno.horaFin);
    const time  = start.getHours() + start.getMinutes() / 60;
    const dur   = Math.max(0.25, (end - start) / 3600000);
    const newT = {
      id: savedTurno.id, day: dayIdx, time, dur,
      petId: savedTurno.mascotaID,
      motivo: savedTurno.servicio?.nombre || savedTurno.notas || 'Consulta',
      vet: savedTurno.profesional?.nombre || 'Dr. Balbi',
      color: savedTurno.profesional?.color || '#A3007B',
      fecha: startDate,
    };
    setTurnos(prev => [...prev, newT]);
  };

  const ROW_H = 56; // px per hour

  // --- DIA VIEW ---
  const DiaView = () => {
    const hoy = turnos.filter(t => t.day === TODAY_IDX).sort((a,b) => a.time - b.time);
    return (
      <div style={{ flex: 1, overflow: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>

              onMouseEnter={(e) => e.currentTarget.style.background = '#FAF7FA'}

  // --- MES VIEW ---
  const MesView = () => {

    const turnosByDay = {};
    turnos.forEach(t => {

    return (
      <div style={{ flex: 1, overflow: 'auto', padding: '0 0 20px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', borderBottom: '1px solid #EFEAEE' }}>
          {['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => (
            <div key={d} style={{ padding: '10px 0', textAlign: 'center', fontSize: 11, fontWeight: 700, color: '#888', letterSpacing: 0.5, textTransform: 'uppercase' }}>{d}</div>
          ))}
        </div>
        {weeks.map((week, wi) => (
          <div key={wi} style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', borderBottom: '1px solid #F4F0F2' }}>
            {week.map((day, di) => {

      {/* Calendar grid - semana */}
      {view === 'semana' && <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>

            <div key={d} style={{
              padding: '12px 8px', textAlign: 'center', borderLeft: '1px solid #F4F0F2',

              <div style={{ fontSize: 11, color: i === TODAY_IDX ? '#A3007B' : '#888', fontWeight: 600, letterSpacing: 0.5, textTransform: 'uppercase' }}>{d}</div>

            </div>

        {/* Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: '60px repeat(7, 1fr)', position: 'relative' }}>

            ))}
          </div>
          {/* Day columns */}
          {DAYS.map((_, dayIdx) => (
            <div key={dayIdx} style={{ position: 'relative', borderLeft: '1px solid #F4F0F2', background: dayIdx === TODAY_IDX ? '#FCF8FB' : 'white' }}>

                  <div key={h}

                    onDragLeave={() => setHover(null)}

                    style={{
                      height: ROW_H, borderTop: '1px solid #F4F0F2',
                      background: hovering ? 'rgba(163,0,123,0.08)' : 'transparent',

                    <div style={{ height: '50%', borderBottom: '1px dashed #F8F4F6' }} />

                );
              })}
              {/* "Now" line on today */}
              {dayIdx === TODAY_IDX && (
                <div style={{ position: 'absolute', left: 0, right: 0, top: ((10.7 - HOURS[0]) * ROW_H), pointerEvents: 'none' }}>

                const top = (t.time - HOURS[0]) * ROW_H;

                return (
                  <div key={t.id}
                    draggable
                    onDragStart={() => onDragStart(t)}
