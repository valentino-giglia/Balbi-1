<style>*, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAFAF8; color: #1A1A1A; -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D8D2D6; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #B8B0B6; background-clip: content-box; border: 2px solid transparent; }
  @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.92); } }
  @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(194,24,91,0.55); } 50% { box-shadow: 0 0 0 8px rgba(194,24,91,0); } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }</style>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
// Mock data for Dr. Balbi prototype
const BALBI = {
  primary: '#A3007B',
  primaryDark: '#7A005C',
  primarySoft: '#F5E6F0',
  primaryTint: '#FAF1F7',
  oxford: '#333333',
  oxfordSoft: '#4A4A4A',
  ink: '#1A1A1A',
  muted: '#6B6B6B',
  border: '#E8E4E8',
  bg: '#FAFAF8',
  card: '#FFFFFF',
  success: '#1F8A5B',
  warning: '#D97706',
  danger: '#C2185B',
  lila: '#E9D5E2',
};

// ============================================================
// API CONFIG — apunta al backend de balbi-back
// ============================================================
const API_BASE = 'http://localhost:3000/api';
window.API_BASE = API_BASE;

// Gestión de token JWT
const Auth = {
  getToken: () => localStorage.getItem('balbi_token'),
  setToken: (t) => localStorage.setItem('balbi_token', t),
  getUser: () => { try { return JSON.parse(localStorage.getItem('balbi_user') || '{}'); } catch { return {}; } },
  setUser: (u) => localStorage.setItem('balbi_user', JSON.stringify(u)),
  getRole: () => { try { return JSON.parse(localStorage.getItem('balbi_user') || '{}').rol || 'admin'; } catch { return 'admin'; } },
  clear: () => { localStorage.removeItem('balbi_token'); localStorage.removeItem('balbi_user'); },
  headers: () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${Auth.getToken()}` }),
  async login(email, contrasena) {
    const r = await fetch(`${API_BASE}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, contrasena }) });
    if (!r.ok) throw new Error('Credenciales inválidas');
    const data = await r.json();
    Auth.setToken(data.token);
    if (data.usuario) Auth.setUser(data.usuario);
    return data;
  },
  async get(path) {
    const r = await fetch(`${API_BASE}${path}`, { headers: Auth.headers() });
    if (r.status === 401) { Auth.clear(); window.location.reload(); }
    if (!r.ok) throw new Error(`Error ${r.status}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(`${API_BASE}${path}`, { method: 'POST', headers: Auth.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(`Error ${r.status}`);
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(`${API_BASE}${path}`, { method: 'PUT', headers: Auth.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(`Error ${r.status}`);
    return r.json();
  },
  async del(path) {
    const r = await fetch(`${API_BASE}${path}`, { method: 'DELETE', headers: Auth.headers() });
    if (!r.ok) throw new Error(`Error ${r.status}`);
    return r.json();
  },
};

// Mappers — convierten el formato de la API al formato del HTML
const mapPaciente = (p) => ({
  id: p.id,
  name: p.nombre,
  dni: p.dni || '—',
  phone: p.telefono || '—',
  email: p.email || '—',
  address: p.domicilio || '—',
  pets: (p.mascotas || []).map(m => m.id),
  lastVisit: p.ultimaVisita || '—',
  balance: 0,
  coOwner: (p.coTutores || []).map(c => c.nombre).join(', ') || null,
});

const mapMascota = (m) => ({
  id: m.id,
  name: m.nombre,
  species: m.especie || 'Canino',
  breed: m.raza || '—',
  sex: m.sexo || 'M',
  birth: m.fechaNacimiento || '2020-01-01',
  weight: m.peso || 0,
  ownerId: m.pacienteID,
  status: m.estado === 'ACTIVO' ? 'activo' : m.estado === 'INTERNADO' ? 'internado' : 'activo',
  color: m.color || '—',
  chip: m.chip || '—',
  alergias: m.alergias || 'Ninguna conocida',
});

const mapTurno = (t) => ({
  id: t.id,
  time: t.hora || '09:00',
  duration: t.duracion || 30,
  petId: t.mascotaID || 1,
  motivo: t.motivo || '—',
  vet: t.profesional?.nombre || 'Dr. Balbi',
  status: t.estado === 'CONFIRMADO' ? 'confirmado' : t.estado === 'EN_CURSO' ? 'en-curso' : 'pendiente',
  color: '#A3007B',
});

const mapConsulta = (c) => ({
  id: c.id,
  petId: c.mascotaID,
  date: (c.fecha || '').slice(0, 10),
  time: c.hora || '—',
  vet: c.profesional?.nombre || 'Dr. Balbi',
  motivo: c.motivo || '—',
  anamnesis: c.anamnesis || '',
  diagnostico: c.diagnostico || '',
  tratamiento: c.tratamiento || '',
  peso: c.peso || 0,
  temp: c.temperatura || 38.5,
  fc: c.frecuenciaCardiaca || 88,
});

// Estado global de la app — se llena desde la API
window._apiData = {
  clients: [],
  pets: [],
  consultas: [],
  turnos: [],
  vacunas: [],
  loaded: false,
};

// Función que carga todos los datos de la API
async function loadApiData() {
  // Siempre limpiar primero para evitar datos mock residuales
  window._apiData.clients = []; window.CLIENTS = [];
  window._apiData.pets = [];    window.PETS = [];
  window._apiData.turnos = [];  window.TURNOS_HOY = [];
  window._apiData.consultas = []; window.CONSULTAS = [];
  try {
    const [pacRes, masRes, turRes, conRes] = await Promise.allSettled([
      Auth.get('/pacientes'),
      Auth.get('/mascotas'),
      Auth.get('/turnos'),
      Auth.get('/consultas'),
    ]);

    if (pacRes.status === 'fulfilled') {
      const raw = pacRes.value.data || pacRes.value || [];
      window._apiData.clients = raw.map(mapPaciente);
      window.CLIENTS = window._apiData.clients;
    }
    if (masRes.status === 'fulfilled') {
      const raw = masRes.value.data || masRes.value || [];
      window._apiData.pets = raw.map(mapMascota);
      window.PETS = window._apiData.pets;
    }
    if (turRes.status === 'fulfilled') {
      const raw = turRes.value.data || turRes.value || [];
      window._apiData.turnos = raw.map(mapTurno);
      window.TURNOS_HOY = window._apiData.turnos;
    }
    if (conRes.status === 'fulfilled') {
      const raw = conRes.value.data || conRes.value || [];
      window._apiData.consultas = raw.map(mapConsulta);
      window.CONSULTAS = window._apiData.consultas;
    }
    window._apiData.loaded = true;
  } catch (e) {
    console.warn('API no disponible, usando datos mock:', e);
  }
}

window.Auth = Auth;
window.loadApiData = loadApiData;

const Avatar = ({ name, size = 36, color }) => {

  const palette = ['#A3007B', '#1F8A5B', '#2D5BA0', '#D97706', '#7A3FBF', '#0E7490'];
  const c = color || palette[name.charCodeAt(0) % palette.length];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: c, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600, fontSize: size * 0.38, flexShrink: 0, fontFamily: 'Inter, sans-serif' }}>
      {initials}
    </div>
  );
};

const PetAvatar = ({ pet, size = 36 }) => {
  const speciesIcon = {
    Canino: '🐕', Felino: '🐈', Conejo: '🐇', Ave: '🐦',
  }[pet?.species] || '🐾';
  const bg = {
    Canino: '#FFF4E6', Felino: '#FAF0F8', Conejo: '#F0F4FF', Ave: '#E8F5EE',
  }[pet?.species] || '#F5F5F5';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.55, flexShrink: 0, border: '1px solid rgba(0,0,0,0.04)' }}>
      {speciesIcon}
    </div>
  );
};

// ---- Badge / Pill ----
const Pill = ({ children, color = '#A3007B', soft = true, size = 'sm' }) => {
  const padding = size === 'sm' ? '3px 9px' : '5px 12px';
  const fontSize = size === 'sm' ? 11 : 12;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding, borderRadius: 999, fontSize, fontWeight: 600,
      background: soft ? color + '14' : color,
      color: soft ? color : 'white',
      letterSpacing: 0.1,
      whiteSpace: 'nowrap',
    }}>{children}</span>
  );
};

const Skel = ({ w = '100%', h = 14, r = 6, style }) => (

);

const Btn = ({ children, onClick, variant = 'primary', size = 'md', icon, style, disabled, type }) => {
  const sizes = {
    sm: { padding: '6px 12px', fontSize: 13, iconSize: 14, h: 30 },
    md: { padding: '9px 16px', fontSize: 14, iconSize: 16, h: 38 },
    lg: { padding: '12px 22px', fontSize: 15, iconSize: 18, h: 46 },
  }[size];
  const variants = {
    primary: { background: '#A3007B', color: 'white', border: '1px solid #A3007B' },
    secondary: { background: 'white', color: '#333', border: '1px solid #E0DCE0' },
    ghost: { background: 'transparent', color: '#333', border: '1px solid transparent' },
    danger: { background: 'white', color: '#C2185B', border: '1px solid #F2D5E2' },
    soft: { background: '#F5E6F0', color: '#A3007B', border: '1px solid transparent' },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled} type={type || 'button'} style={{
      ...variants, padding: sizes.padding, fontSize: sizes.fontSize, height: sizes.h,
      borderRadius: 8, fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',

      transition: 'all .12s ease', opacity: disabled ? 0.5 : 1, ...style,

const Input = ({ icon, ...props }) => (

    </div>
    {children}
    {hint && <div style={{ fontSize: 11, color: '#888' }}>{hint}</div>}
  </div>
);

Object.assign(window, {

  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
// dashboard.jsx
// Dashboard / Centro de Guardia 24hs — todo editable
const { useState: useStateD, useEffect: useEffectD, useMemo: useMemoD } = React;

const Dashboard = ({ goTo, openSearch }) => {
  const _savedGuardia = (() => { try { return JSON.parse(localStorage.getItem('balbi_guardia') || '{}'); } catch { return {}; } })();
  const [vets, setVets] = useStateD(_savedGuardia.vets || window.VETS_INIT);
  const [guardias, setGuardias] = useStateD(_savedGuardia.guardias || window.GUARDIAS_INIT);
  const [alertas, setAlertas] = useStateD(window.ALERTAS_INIT);
  const [cola, setCola] = useStateD(window.COLA_INIT);
  const [internados, setInternados] = useStateD(window.INTERNADOS_LIVE);

  const [editGuardia, setEditGuardia] = useStateD(null);
  const [editVets, setEditVets] = useStateD(false);
  const [editAlerta, setEditAlerta] = useStateD(null);
  const [editCola, setEditCola] = useStateD(null);
  const [editInt, setEditInt] = useStateD(null);

  // Persistir vets y guardias en localStorage
  useEffectD(() => { localStorage.setItem('balbi_guardia', JSON.stringify({ vets, guardias })); }, [vets, guardias]);

  useEffectD(() => {
    if (!window.Auth?.getToken()) return;
    const today = window.todayAR();
    window.Auth.get('/turnos?fechaInicio=' + today + 'T00:00:00&fechaFin=' + today + 'T23:59:59').then(res => {
      const raw = Array.isArray(res) ? res : (res.data || []);
      const fromApi = raw.map(t => ({
        id: 'turno-' + t.id, fromTurno: true,
        petName: t.mascota?.nombre || 'Sin nombre',
        species: t.mascota?.especie || 'Canino',
        ownerName: t.paciente?.nombre || 'Sin registrar',
        motivo: t.servicio?.nombre || t.notas || 'Consulta',
        triage: 'verde', espera: 0, primera: false,
        llegada: t.horaInicio ? new Date(new Date(t.horaInicio).getTime() - 3 * 60 * 60 * 1000).toISOString().slice(11, 16) : '00:00',
      }));
      setCola(prev => {
        const manual = prev.filter(c => !c.fromTurno);
        return [...manual, ...fromApi];
      });
    }).catch(() => {});
  }, []);

  const guardiaActiva = guardias.find(g => g.activa) || guardias[0];
  const vetActivo = vets.find(v => v.id === guardiaActiva?.vetId);
  const proxima = guardiaActiva ? guardias.find(g => !g.activa && g.fecha >= guardiaActiva.fecha) : undefined;
  const proxVet = vets.find(v => v.id === proxima?.vetId);

  const [_dashTick, _setDashTick] = useStateD(0);
  useEffectD(() => { const t = setInterval(() => _setDashTick(n => n + 1), 1000); return () => clearInterval(t); }, []);
  const { restante, progreso } = (() => {
    if (!guardiaActiva?.desde || !guardiaActiva?.hasta) return { restante: '--', progreso: 0 };
    const now = window.nowAR ? window.nowAR() : new Date();
    const nowMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const [dh, dm] = guardiaActiva.desde.split(':').map(Number);
    const [hh, hm] = guardiaActiva.hasta.split(':').map(Number);
    const desdeMin = dh * 60 + dm, hastaMin = hh * 60 + hm;
    const totalMin = hastaMin - desdeMin;
    const pct = totalMin > 0 ? Math.min(100, Math.max(0, Math.round((nowMin - desdeMin) / totalMin * 100))) : 0;
    const remMin = Math.max(0, hastaMin - nowMin);
    const rh = Math.floor(remMin / 60), rm = remMin % 60;
    return { restante: rh > 0 ? `${rh}h ${rm}min` : `${rm}min`, progreso: pct };
  })();

  const kpis = [
    { label: 'Ingresos últimas 24hs', value: 14, sub: '+3 vs ayer', trend: 'up', color: '#A3007B' },
    { label: 'Internados ahora', value: internados.length, sub: `${internados.filter(i => i.estado === 'critico').length} críticos`, trend: 'flat', color: '#D97706' },
    { label: 'Casos críticos 24hs', value: 2, sub: 'estables', trend: 'flat', color: '#C2185B' },
    { label: 'Tiempo prom. atención', value: '12m', sub: '-3m vs prom 7d', trend: 'up', color: '#1F8A5B' },
  ];

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 18, overflow: 'auto', flex: 1 }}>
      <GuardiaHero
        guardia={guardiaActiva}
        vet={vetActivo}
        proxima={proxima}
        proxVet={proxVet}
        restante={restante}
        progreso={progreso}
        onEditGuardia={() => setEditGuardia(guardiaActiva || { id: Date.now(), vetId: vets[0]?.id || 1, tipo: 'Guardia 24hs', fecha: window.todayAR(), desde: '08:00', hasta: '20:00', activa: true })}
        onEditVets={() => setEditVets(true)}
      />

      {alertas.length > 0 && (
        <AlertasBand
          alertas={alertas}
          onEdit={(a) => setEditAlerta(a)}
          onResolver={(id) => setAlertas(alertas.filter(a => a.id !== id))}
          onAdd={() => setEditAlerta({ id: null, tipo: 'medicacion', petName: '', msg: '', detalle: '', minutos: 15, severity: 'critico' })}
        />
      )}

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14 }}>
        {kpis.map((k, i) => <KPICard key={i} {...k} />)}
      </div>

      <IngresosChart />

      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 14 }}>
        <ColaAtencion
          cola={cola}
          vets={vets}
          onAtender={(item) => setCola(cola.filter(c => c.id !== item.id))}
          onEdit={(item) => setEditCola(item)}
          onAdd={() => setEditCola({ id: null, petName: '', species: 'Canino', ownerName: '', motivo: '', triage: 'amarillo', espera: 0, primera: true, llegada: window.timeAR() })}
        />
        <InternadosLive
          internados={internados}
          vets={vets}
          onEdit={(item) => setEditInt(item)}
          goTo={goTo}
        />
      </div>

      <div style={{ textAlign: 'center', color: '#999', fontSize: 11.5, padding: '4px 0 8px' }}>
        📊 Las estadísticas y gráficos analíticos se movieron a <a onClick={() => goTo && goTo('agenda')} style={{ color: '#A3007B', cursor: 'pointer', fontWeight: 600 }}>Análisis</a> · Esta vista es operativa en tiempo real
      </div>

      {editGuardia && <GuardiaModal guardia={editGuardia} vets={vets} onClose={() => setEditGuardia(null)} onSave={(g) => { if (guardias.some(x => x.id === g.id)) { setGuardias(guardias.map(x => x.id === g.id ? g : x)); } else { setGuardias([...guardias, { ...g, activa: true }]); } setEditGuardia(null); }} />}
      {editVets && <VetsModal vets={vets} onClose={() => setEditVets(false)} onSave={(vs) => { setVets(vs); setEditVets(false); }} />}
      {editAlerta && <AlertaModal alerta={editAlerta} onClose={() => setEditAlerta(null)} onSave={(a) => { if (a.id) setAlertas(alertas.map(x => x.id === a.id ? a : x)); else setAlertas([...alertas, { ...a, id: Math.max(0, ...alertas.map(x=>x.id))+1 }]); setEditAlerta(null); }} onDelete={(id) => { setAlertas(alertas.filter(x => x.id !== id)); setEditAlerta(null); }} />}
      {editCola && <ColaModal item={editCola} onClose={() => setEditCola(null)} onSave={(it) => { if (it.id) setCola(cola.map(x => x.id === it.id ? it : x)); else setCola([...cola, { ...it, id: Math.max(0, ...cola.map(x=>x.id))+1 }]); setEditCola(null); }} onDelete={(id) => { setCola(cola.filter(x => x.id !== id)); setEditCola(null); }} />}
      {editInt && <InternadoModal item={editInt} vets={vets} onClose={() => setEditInt(null)} onSave={(it) => { setInternados(internados.map(x => x.petId === it.petId ? it : x)); setEditInt(null); }} />}
    </div>
  );
};

  return (
    <div style={{
      background: 'linear-gradient(120deg, #2B2B2B 0%, #1A1A1A 60%, #3D2A36 100%)',
      borderRadius: 16, padding: '22px 26px', color: 'white',
      position: 'relative', overflow: 'hidden',
      border: '1px solid rgba(163,0,123,0.3)',
      flexShrink: 0,
    }}>
      <div style={{ position: 'absolute', right: -30, top: -30, opacity: 0.06 }}>
        <svg width="240" height="240" viewBox="0 0 24 24" fill="#A3007B"><path d="M9 2h6v7h7v6h-7v7H9v-7H2V9h7z" /></svg>
      </div>

      <div style={{ position: 'relative', display: 'grid', gridTemplateColumns: '1fr 1fr 280px', gap: 28, alignItems: 'center' }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 10.5, color: 'rgba(255,255,255,0.55)', textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 700 }}>Guardia activa</span>
            <span style={{ width: 3, height: 3, borderRadius: '50%', background: 'rgba(255,255,255,0.3)' }} />
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)', textTransform: 'capitalize' }}>{fechaLabel} · <span style={{ fontFamily: 'ui-monospace, monospace', letterSpacing: 0 }}>{clockStr}</span></span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ width: 56, height: 56, borderRadius: '50%', background: vet.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 18, color: 'white', flexShrink: 0, boxShadow: '0 4px 14px rgba(163,0,123,0.4)' }}>

// ─── Ingresos por tipo · barras apiladas ─────────────────────────────
const IngresosChart = () => {
  const tipos = [
    { key: 'urgencias', label: 'Urgencias', color: '#A3007B' },
    { key: 'controles', label: 'Controles', color: '#D97706' },
    { key: 'cirugias', label: 'Cirugías', color: '#1F8A5B' },
    { key: 'vacunaciones', label: 'Vacunaciones', color: '#2D5BA0' },
  ];
  const data = [
    { sem: 'Sem 1', urgencias: 18, controles: 24, cirugias: 6, vacunaciones: 12 },
    { sem: 'Sem 2', urgencias: 22, controles: 28, cirugias: 8, vacunaciones: 14 },
    { sem: 'Sem 3', urgencias: 15, controles: 31, cirugias: 5, vacunaciones: 18 },
    { sem: 'Sem 4', urgencias: 26, controles: 27, cirugias: 9, vacunaciones: 11 },
  ];
  const [hover, setHover] = useStateD(null);

  const W = 760, H = 280;
  const padL = 44, padR = 20, padT = 24, padB = 44;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const totals = data.map(d => d.urgencias + d.controles + d.cirugias + d.vacunaciones);
  const maxRaw = Math.max(...totals);
  const niceMax = Math.ceil(maxRaw / 10) * 10;
  const yTicks = 5;
  const yStep = niceMax / yTicks;
  const barW = innerW / data.length * 0.5;
  const gap = innerW / data.length;

  return (
    <div style={{ background: '#FAFAF8', border: '1px solid #EFEAEE', borderRadius: 12, padding: '18px 20px', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: '#1A1A1A' }}>Ingresos por tipo — últimas 4 semanas</div>
          <div style={{ fontSize: 11.5, color: '#888', marginTop: 2 }}>{totals.reduce((s, v) => s + v, 0)} consultas totales · promedio {(totals.reduce((s,v)=>s+v,0)/4).toFixed(0)}/sem</div>
        </div>
      </div>

      <div style={{ position: 'relative' }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: 'block', overflow: 'visible' }}>
          {/* Grid lines + Y axis labels */}
          {Array.from({ length: yTicks + 1 }, (_, i) => {
            const y = padT + innerH - (i * innerH) / yTicks;
            const val = Math.round(i * yStep);
            return (
              <g key={i}>
                <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#E8E2E5" strokeWidth="1" strokeDasharray={i === 0 ? '0' : '2 3'} />
                <text x={padL - 8} y={y + 4} fontSize="11" fill="#999" textAnchor="end" fontFamily="ui-monospace, monospace">{val}</text>
              </g>
            );
          })}

          {/* Bars */}
          {data.map((d, i) => {
            const cx = padL + gap * (i + 0.5);
            const x = cx - barW / 2;
            let acc = 0;
            const segs = tipos.map(t => {
              const v = d[t.key];
              const h = (v / niceMax) * innerH;
              const yTop = padT + innerH - acc - h;
              acc += h;
              return { ...t, v, h, yTop };
            });
            const isHover = hover === i;
            return (
              <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: 'pointer' }}>
                {/* Invisible hover target */}
                <rect x={cx - gap / 2} y={padT} width={gap} height={innerH} fill="transparent" />
                {segs.map((s, j) => (
                  <rect key={s.key} x={x} y={s.yTop} width={barW} height={s.h}
                    fill={s.color}
                    opacity={hover != null && hover !== i ? 0.35 : 1}
                    rx={j === 0 ? 3 : 0} ry={j === 0 ? 3 : 0}
                    style={{ transition: 'opacity .15s' }}
                  />
                ))}
                {/* Total on top when hover */}
                {isHover && (
                  <text x={cx} y={padT + innerH - segs.reduce((s, x) => s + x.h, 0) - 8} textAnchor="middle" fontSize="12" fontWeight="700" fill="#1A1A1A" fontFamily="ui-monospace, monospace">
                    {totals[i]}
                  </text>
                )}
                {/* X label */}
                <text x={cx} y={H - padB + 18} textAnchor="middle" fontSize="12" fontWeight={isHover ? 700 : 600} fill={isHover ? '#A3007B' : '#666'}>{d.sem}</text>
              </g>
            );
          })}
        </svg>

        {/* Tooltip */}
        {hover != null && (() => {
          const d = data[hover];
          const cx = padL + gap * (hover + 0.5);
          const xPct = (cx / W) * 100;
          return (
            <div style={{
              position: 'absolute', left: `${xPct}%`, top: 6, transform: 'translateX(-50%)',
              background: 'white', border: '1px solid #E8E2E5', borderRadius: 8, padding: '8px 12px',
              boxShadow: '0 6px 18px -6px rgba(0,0,0,0.15)', pointerEvents: 'none', minWidth: 160, zIndex: 2,
            }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#1A1A1A', marginBottom: 6, display: 'flex', justifyContent: 'space-between' }}>
                <span>{d.sem}</span>
                <span style={{ fontFamily: 'ui-monospace, monospace', color: '#A3007B' }}>{totals[hover]} total</span>
              </div>
              {tipos.map(t => (
                <div key={t.key} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, padding: '2px 0' }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: t.color }} />
                  <span style={{ color: '#666', flex: 1 }}>{t.label}</span>
                  <span style={{ fontFamily: 'ui-monospace, monospace', fontWeight: 600, color: '#1A1A1A' }}>{d[t.key]}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </div>

      {/* Legend */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 22, marginTop: 6, flexWrap: 'wrap' }}>
        {tipos.map(t => (
          <span key={t.key} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11.5, color: '#555', fontWeight: 600 }}>
            <span style={{ width: 12, height: 12, borderRadius: 3, background: t.color }} />
            {t.label}
          </span>
        ))}
      </div>
    </div>
  );
};

                      <div style={{ position: 'absolute', bottom: -2, right: -2, width: 14, height: 14, borderRadius: '50%', background: 'white', border: '1px solid #EFEAEE', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9 }}>🕊</div>
                    </div>
                    <div>
                      <div style={{ fontWeight: 600 }}>{f.name}</div>
                      <div style={{ fontSize: 11, color: '#888' }}>{f.species} · {f.breed} · {ageY} años</div>
                    </div>
                  </div>
                  <div style={{ color: '#555' }}>{owner?.name}</div>
                  <div style={{ color: '#555' }}>{f.birth}</div>
                  <div style={{ color: '#555' }}>{f.deathDate}</div>
                  <div style={{ color: '#666', fontStyle: 'italic' }}>{f.cause}</div>
                  <div style={{ color: '#555' }}>{f.lastVet}</div>
                  <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }} onClick={(e) => e.stopPropagation()}>
                    <button title="Editar" style={iconBtn} onClick={() => setEditFall(f)}><IconEdit size={14} /></button>
                    <button title="Eliminar" onClick={() => setConfirmDel(f)} style={{ ...iconBtn, color: '#C2185B' }}
                      onMouseEnter={(e) => { e.currentTarget.style.background = '#FCE7EE'; }}
                      onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}><IconTrash size={14} /></button>
                  </div>
                </div>
              );
            })}
            {filteredFall.length === 0 && <div style={{ padding: '40px 0', textAlign: 'center', color: '#888', fontSize: 13 }}>Sin registros</div>}
          </div>
        </>
      )}

      <FallecidoDrawer fall={openFall} open={!!openFall} onClose={() => setOpenFall(null)} />

      {editFall && (
        <Modal open={true} onClose={() => setEditFall(null)} title="Editar registro — fallecido" width={520}
          footer={<><Btn variant="ghost" onClick={() => setEditFall(null)}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => { setFallecidos(fallecidos.map(f => f.id === editFall.id ? editFall : f)); setEditFall(null); }}>Guardar cambios</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 10 }}>
              <Field label="Nombre"><Input value={editFall.name} onChange={(e) => setEditFall({...editFall, name: e.target.value})} /></Field>
              <Field label="Especie">
                <select value={editFall.species} onChange={(e) => setEditFall({...editFall, species: e.target.value})} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%' }}>
                  <option>Canino</option><option>Felino</option><option>Conejo</option><option>Ave</option><option>Otro</option>
                </select>
              </Field>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <Field label="Raza"><Input value={editFall.breed} onChange={(e) => setEditFall({...editFall, breed: e.target.value})} /></Field>
              <Field label="Fecha fallecimiento"><Input type="date" value={editFall.deathDate} onChange={(e) => setEditFall({...editFall, deathDate: e.target.value})} /></Field>
            </div>
            <Field label="Causa de fallecimiento">
              <textarea value={editFall.cause} onChange={(e) => setEditFall({...editFall, cause: e.target.value})} rows={2} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none' }} />
            </Field>
            <Field label="Último profesional">
              <select value={editFall.lastVet} onChange={(e) => setEditFall({...editFall, lastVet: e.target.value})} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%' }}>
                <option>Dr. Balbi</option><option>Dra. Méndez</option><option>Dr. Sosa</option><option>Dra. Ibáñez</option>
              </select>
            </Field>
          </div>
        </Modal>
      )}

      {confirmDel && (
        <Modal open={true} onClose={() => setConfirmDel(null)} title="Eliminar registro" width={420}
          footer={<><Btn variant="ghost" onClick={() => setConfirmDel(null)}>Cancelar</Btn><Btn variant="danger" icon={<IconTrash />} onClick={() => removeFall(confirmDel.id)}>Eliminar definitivamente</Btn></>}>
          <div style={{ fontSize: 13.5, color: '#444', lineHeight: 1.6 }}>
            Vas a eliminar el registro de <strong>{confirmDel.name}</strong> ({(window.CLIENTS||[]).find(c => c.id === confirmDel.ownerId)?.name}). Esta acción no se puede deshacer y se perderá su historia clínica.
          </div>
        </Modal>
      )}
    </div>
  );
};

const NuevoClienteModal = ({ onClose, onCreated }) => {
  const [data, setData] = useState({ nombre: '', dni: '', telefono: '', email: '', domicilio: '' });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const selStyle = { height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%', background: 'white' };

  const handleSave = async () => {
    if (!data.nombre.trim()) return;
    setSaving(true); setError('');
    try {
      const res = await window.Auth.post('/pacientes', data);
      const nuevo = { id: res.id, name: res.nombre, dni: res.dni || '—', phone: res.telefono || '—', email: res.email || '—', address: res.domicilio || '—', pets: [], lastVisit: '—', balance: 0 };

      if (onCreated) onCreated(nuevo);
      onClose();

      setError('No se pudo guardar. Verificá la conexión.');

  return (

        <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 10 }}>

          <Field label="Teléfono"><Input value={data.telefono} onChange={(e) => setData({...data, telefono: e.target.value})} placeholder="Ej. 341 555-1234" /></Field>
          <Field label="Email"><Input type="email" value={data.email} onChange={(e) => setData({...data, email: e.target.value})} placeholder="correo@ejemplo.com" /></Field>
        </div>

        {error && <div style={{ fontSize: 12, color: '#C2185B', background: '#FFF0F4', padding: '8px 12px', borderRadius: 8 }}>{error}</div>}
      </div>

  );
};

              {['M','H'].map(s => <button key={s} onClick={() => setData({...data, sexo: s})} style={{ flex: 1, borderRadius: 8, border: data.sexo === s ? '2px solid #A3007B' : '1px solid #E0DCE0', background: data.sexo === s ? '#FAF1F7' : 'white', color: data.sexo === s ? '#A3007B' : '#666', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', fontSize: 13 }}>{s === 'M' ? '♂ Macho' : '♀ Hembra'}</button>)}

<script type="text/babel">

// drawers.jsx
// Internación + Drawers (cliente / paciente)
const { useState: useStateD2 } = React;
const useState = useStateD2;
const InternacionView = () => {
  const [boxes, setBoxes] = useState(() => window._INTERN_BOXES !== undefined ? window._INTERN_BOXES : window.BOXES_INIT);
  React.useEffect(() => { window._INTERN_BOXES = boxes; }, [boxes]);
  const [editing, setEditing] = useState(null);
  const [newBox, setNewBox] = useState(false);
  const [confirmAlta, setConfirmAlta] = useState(null);

  const updateBox = (id, patch) => setBoxes(boxes.map(b => b.id === id ? { ...b, ...patch } : b));
  const addControl = (boxId, control) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: [...b.controles, control] } : b));
    setEditing(null);
  };
  const editControl = (boxId, idx, control) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: b.controles.map((r, i) => i === idx ? control : r) } : b));
    setEditing(null);
  };
  const deleteControl = (boxId, idx) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: b.controles.filter((_, i) => i !== idx) } : b));
  };
  const dischargeBox = (id) => { setBoxes(boxes.filter(b => b.id !== id)); setConfirmAlta(null); };
  const addBox = (data) => { setBoxes([...boxes, { ...data, id: Math.max(0, ...boxes.map(b => b.id)) + 1, controles: [] }]); setNewBox(false); };

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 16, overflow: 'auto', flex: 1 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ fontSize: 13, color: '#666' }}><strong style={{ color: '#1A1A1A' }}>{boxes.length}</strong> pacientes en internación</div>
        <div style={{ flex: 1 }} />
        <Btn variant="primary" size="md" icon={<IconPlus />} onClick={() => setNewBox(true)}>Internar paciente</Btn>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
        {boxes.map(b => {
          const p = PETS.find(x => x.id === b.petId);
          const owner = p ? (window.CLIENTS||[]).find(c => c.id === p.ownerId) : null;
          const last = b.controles[b.controles.length - 1];
          return (
            <div key={b.id} style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, padding: 18 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {p ? <PetAvatar pet={p} size={48} /> : <div style={{ width: 48, height: 48, borderRadius: 24, background: '#F4F0F2' }} />}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{p?.name || 'Paciente'} <span style={{ color: '#888', fontWeight: 500, fontSize: 13 }}>· Box {b.id}</span></div>
                  <div style={{ fontSize: 12, color: '#888' }}>{p?.species} · {p?.breed} · {owner?.name}</div>
                </div>
                <Pill color={b.estado === 'estable' ? '#1F8A5B' : b.estado === 'crítico' ? '#C2185B' : '#D97706'}>{b.estado}</Pill>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 14 }}>
                <Vital label="T° últ." value={last ? `${last.t}°C` : '—'} icon={<IconActivity />} color={last && last.t > 39 ? '#C2185B' : '#1F8A5B'} />
                <Vital label="FC" value={last ? last.fc : '—'} icon={<IconHeart />} />
                <Vital label="FR" value={last ? last.fr : '—'} icon={<IconActivity />} />
                <Vital label="Ingreso" value={b.ingreso.split(' ')[0].slice(5)} icon={<IconClock />} />
              </div>
              <div style={{ marginTop: 14, padding: 12, background: '#FAFAF8', borderRadius: 10, fontSize: 12, color: '#555', lineHeight: 1.5 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                  <strong>Plan terapéutico</strong>
                  <button onClick={() => setEditing({ mode: 'plan', boxId: b.id })} style={{ background: 'transparent', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'inherit' }}><IconEdit size={11} /> Editar</button>
                </div>
                {b.plan} · <em>Dieta:</em> {b.dieta}
              </div>

              <div style={{ marginTop: 14 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: 0.4 }}>Hoja de evolución ({b.controles.length})</div>
                  <button onClick={() => setEditing({ mode: 'control', boxId: b.id })} style={{ background: '#FAF1F7', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 700, cursor: 'pointer', padding: '4px 10px', borderRadius: 999, display: 'flex', alignItems: 'center', gap: 4, fontFamily: 'inherit' }}><IconPlus size={11} /> Registrar control</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 200, overflow: 'auto' }}>
                  {b.controles.map((r, i) => (
                    <div key={i} style={{ display: 'grid', gridTemplateColumns: '60px 1fr auto', gap: 10, padding: '8px 10px', background: '#FAFAF8', borderRadius: 8, fontSize: 12, alignItems: 'flex-start' }}>
                      <div style={{ fontWeight: 700, color: '#A3007B' }}>{r.hora}</div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ display: 'flex', gap: 10, color: '#444', fontWeight: 600, marginBottom: 2 }}>
                          <span>T° {r.t}</span><span>FC {r.fc}</span><span>FR {r.fr}</span>
                        </div>
                        <div style={{ color: '#666', lineHeight: 1.4 }}>{r.obs}</div>
                        <div style={{ fontSize: 10.5, color: '#999', marginTop: 2 }}>— {r.autor}</div>
                      </div>
                      <div style={{ display: 'flex', gap: 2 }}>
                        <button title="Editar" onClick={() => setEditing({ mode: 'control', boxId: b.id, idx: i, control: r })} style={iconBtn2}><IconEdit size={11} /></button>
                        <button title="Eliminar" onClick={() => deleteControl(b.id, i)} style={{ ...iconBtn2, color: '#C2185B' }}><IconTrash size={11} /></button>
                      </div>
                    </div>
                  ))}
                  {b.controles.length === 0 && <div style={{ padding: '16px 0', textAlign: 'center', color: '#999', fontSize: 12 }}>Sin registros aún</div>}
                </div>
              </div>

              <div style={{ display: 'flex', gap: 6, marginTop: 14 }}>
                <Btn variant="secondary" size="sm" icon={<IconEdit />} style={{ flex: 1 }} onClick={() => setEditing({ mode: 'box', boxId: b.id, box: b })}>Editar internación</Btn>
                <Btn variant="primary" size="sm" icon={<IconCheck />} style={{ flex: 1 }} onClick={() => setConfirmAlta(b)}>Dar de alta</Btn>
              </div>
            </div>
          );
        })}
        {boxes.length === 0 && (
          <div style={{ gridColumn: '1 / -1', padding: 60, textAlign: 'center', color: '#888', background: 'white', border: '1px dashed #E0DCE0', borderRadius: 12 }}>
            <IconBed size={32} style={{ color: '#D4C8CE', marginBottom: 8 }} />
            <div style={{ fontSize: 14, fontWeight: 600, color: '#666' }}>No hay pacientes internados</div>
            <div style={{ fontSize: 12, marginTop: 4 }}>Hacé clic en "Internar paciente" para empezar</div>
          </div>
        )}
      </div>

      {editing?.mode === 'control' && <ControlModal boxId={editing.boxId} initial={editing.control} idx={editing.idx} onClose={() => setEditing(null)} onSave={(c) => editing.idx != null ? editControl(editing.boxId, editing.idx, c) : addControl(editing.boxId, c)} />}
      {editing?.mode === 'plan' && <PlanModal box={boxes.find(b => b.id === editing.boxId)} onClose={() => setEditing(null)} onSave={(patch) => { updateBox(editing.boxId, patch); setEditing(null); }} />}
      {editing?.mode === 'box' && <BoxModal box={editing.box} onClose={() => setEditing(null)} onSave={(patch) => { updateBox(editing.boxId, patch); setEditing(null); }} onDelete={() => dischargeBox(editing.boxId)} />}
      {newBox && <BoxModal onClose={() => setNewBox(false)} onSave={addBox} isNew />}
      {confirmAlta && (
        <Modal open={true} onClose={() => setConfirmAlta(null)} title="Dar de alta" width={420}
          footer={<><Btn variant="ghost" onClick={() => setConfirmAlta(null)}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => dischargeBox(confirmAlta.id)}>Confirmar alta</Btn></>}>
          <div style={{ fontSize: 13.5, color: '#444', lineHeight: 1.6 }}>
            ¿Dar de alta a <strong>{(window.PETS || []).find(p => p.id === confirmAlta.petId)?.name}</strong>? Se cerrará la hoja de evolución y se moverá a la historia clínica.
          </div>
        </Modal>
      )}
    </div>
  );
};

const iconBtn2 = { background: 'transparent', border: 'none', color: '#888', cursor: 'pointer', padding: 4, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center' };

const ControlModal = ({ boxId, initial, idx, onClose, onSave }) => {
  const now = window.nowAR ? window.nowAR() : new Date();
  const [c, setC] = useState(initial || { hora: now.toISOString().slice(11, 16), t: 38.5, fc: 90, fr: 22, obs: '', autor: 'Dr. Balbi' });
  return (
    <Modal open={true} onClose={onClose} title={idx != null ? 'Editar control' : 'Registrar control'}
      footer={<><Btn variant="ghost" onClick={onClose}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => onSave(c)}>{idx != null ? 'Guardar cambios' : 'Registrar'}</Btn></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10 }}>
          <Field label="Hora"><Input value={c.hora} onChange={(e) => setC({ ...c, hora: e.target.value })} /></Field>
          <Field label="T° (°C)"><Input type="number" step="0.1" value={c.t} onChange={(e) => setC({ ...c, t: +e.target.value })} /></Field>
          <Field label="FC (lpm)"><Input type="number" value={c.fc} onChange={(e) => setC({ ...c, fc: +e.target.value })} /></Field>
          <Field label="FR (rpm)"><Input type="number" value={c.fr} onChange={(e) => setC({ ...c, fr: +e.target.value })} /></Field>
        </div>
        <Field label="Observaciones">
          <textarea value={c.obs} onChange={(e) => setC({ ...c, obs: e.target.value })} rows={4} placeholder="Estado general, apetito, hidratación, evolución de la herida…"
            style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 13.5, fontFamily: 'inherit', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }} />
        </Field>
        <Field label="Profesional"><Input value={c.autor} onChange={(e) => setC({ ...c, autor: e.target.value })} /></Field>
      </div>
    </Modal>
  );
};

const PlanModal = ({ box, onClose, onSave }) => {
  const [data, setData] = useState({ plan: box.plan, dieta: box.dieta, estado: box.estado });
  return (

const ClientDrawer = ({ client, open, onClose, goToPet, goToMensajes, onSaved }) => {
  if (!client) return null;
  const pets = (window.PETS || []).filter(p => p.ownerId === client.id);

  const [form, setForm] = React.useState(client);

  const [saveError, setSaveError] = React.useState('');
  React.useEffect(() => { setForm(client); setEditMode(false); }, [client]);

  const handleSave = async () => {
    setSaving(true); setSaveError('');
    // Actualización optimista: reflejar cambios de inmediato
    window.CLIENTS = (window.CLIENTS || []).map(c => c.id === client.id ? { ...c, ...form } : c);
    setEditMode(false);

        await window.Auth.put(`/pacientes/${client.id}`, {

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>

            <Field label="DNI"><Input value={form.dni} onChange={(e) => setForm({...form, dni: e.target.value})} /></Field>
          </div>
          <Field label="Co-responsable (pareja, familiar, etc.)">

          </Field>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <Field label="Teléfono"><Input value={form.phone} onChange={(e) => setForm({...form, phone: e.target.value})} /></Field>
