      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'white', border: '1px solid #EFEAEE', borderRadius: 12 }}>
        <div style={{ width: 36, height: 36, borderRadius: 8, background: '#E8F5EE', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#0F9D58" d="M37 4H11a3 3 0 00-3 3v34a3 3 0 003 3h26a3 3 0 003-3V7a3 3 0 00-3-3z"/><path fill="white" d="M14 14h20v3H14zM14 19h20v3H14zM14 24h20v3H14zM14 29h20v3H14zM14 34h20v3H14zM21 14h2v23h-2zM27 14h2v23h-2z"/></svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13.5, fontWeight: 700, color: '#1A1A1A' }}>Sincronizado con Google Sheets</div>
          <div style={{ fontSize: 11.5, color: '#888', marginTop: 1 }}>
            Planilla: <strong>Dr. Balbi · Listado de Precios 2026</strong> · Última sincronización hace 12 segundos
          </div>
        </div>
        <Btn variant="secondary" size="sm" icon={<IconCheck />}>Abrir en Sheets</Btn>
        <Btn variant="soft" size="sm">Sincronizar ahora</Btn>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        <KpiBox label="Productos" value={products.length} icon={<IconFile />} color="#A3007B" />
        <KpiBox label="Margen promedio" value={avgMargin.toFixed(0) + '%'} icon={<IconArrowUp />} color="#1F8A5B" />
        <KpiBox label="Valor stock (costo)" value={fmt(totals.costoTotal)} icon={<IconActivity />} color="#7A3FBF" />
        <KpiBox label="Valor stock (venta)" value={fmt(totals.ventaTotal)} icon={<IconActivity />} color="#D97706" />
      </div>

      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <Input icon={<IconSearch />} placeholder="Buscar producto…" value={q} onChange={(e) => setQ(e.target.value)} style={{ minWidth: 320 }} />
        <div style={{ display: 'flex', gap: 4, background: '#F4F0F2', padding: 3, borderRadius: 8, flexWrap: 'wrap' }}>
          {cats.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{
              padding: '6px 12px', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600,
              background: cat === c ? 'white' : 'transparent',
              color: cat === c ? '#A3007B' : '#666',
              cursor: 'pointer', boxShadow: cat === c ? '0 1px 2px rgba(0,0,0,0.04)' : 'none', fontFamily: 'inherit', textTransform: 'capitalize',
            }}>{c}</button>
          ))}
        </div>
        <div style={{ flex: 1 }} />
        <Btn variant="primary" size="md" icon={<IconPlus />} onClick={() => setShowNew(true)}>Nuevo producto</Btn>
      </div>

      <div style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 110px 130px 130px 110px 90px 90px 110px 50px', padding: '12px 16px', background: '#FAFAF8', fontSize: 11, fontWeight: 700, color: '#666', letterSpacing: 0.4, textTransform: 'uppercase', borderBottom: '1px solid #EFEAEE' }}>
          <div>Producto</div>
          <div>Categoría</div>
          <div style={{ textAlign: 'center' }}>Costo</div>
          <div style={{ textAlign: 'center' }}>Venta</div>
          <div style={{ textAlign: 'center' }}>Margen</div>
          <div style={{ textAlign: 'center' }}>Stock</div>
          <div>Unidad</div>
          <div>Proveedor</div>
          <div></div>
        </div>
        {filtered.map(p => {
          const m = margin(p.costo, p.venta);
          const isEditing = editing === p.id;
          return (
            <div key={p.id} style={{ display: 'grid', gridTemplateColumns: '1.4fr 110px 130px 130px 110px 90px 90px 110px 50px', padding: '10px 16px', borderBottom: '1px solid #F4F0F2', alignItems: 'center', fontSize: 13, gap: 4, background: isEditing ? '#FAF1F7' : 'white' }}>
              <EditableCell value={p.nombre} onSave={(v) => updateField(p.id, 'nombre', v)} bold saved={saved === p.id + ':nombre'} />
              <Pill color={catColor(p.categoria)}>{p.categoria}</Pill>
              <EditableCell value={p.costo} onSave={(v) => updateField(p.id, 'costo', v)} type="money" align="center" saved={saved === p.id + ':costo'} />
              <EditableCell value={p.venta} onSave={(v) => updateField(p.id, 'venta', v)} type="money" align="center" saved={saved === p.id + ':venta'} />
              <div style={{ textAlign: 'center', fontWeight: 700, color: m === null ? '#888' : m >= 100 ? '#1F8A5B' : m >= 50 ? '#D97706' : '#C2185B', fontSize: 13.5 }}>
                {m === null ? '—' : `+${m.toFixed(0)}%`}
              </div>
              <EditableCell value={p.stock} onSave={(v) => updateField(p.id, 'stock', v)} type="num" align="center" saved={saved === p.id + ':stock'} placeholder="—" />
              <EditableCell value={p.unidad} onSave={(v) => updateField(p.id, 'unidad', v)} muted />
              <EditableCell value={p.proveedor} onSave={(v) => updateField(p.id, 'proveedor', v)} muted />
              <button onClick={() => removeRow(p.id)} title="Eliminar" style={{ background: 'transparent', border: 'none', color: '#888', cursor: 'pointer', display: 'flex', justifySelf: 'end', padding: 6, borderRadius: 6 }}
                onMouseEnter={(e) => { e.currentTarget.style.color = '#C2185B'; e.currentTarget.style.background = '#FCE7EE'; }}
                onMouseLeave={(e) => { e.currentTarget.style.color = '#888'; e.currentTarget.style.background = 'transparent'; }}><IconTrash size={15} /></button>
            </div>
          );
        })}
      </div>

      {showNew && <NewProductModal onClose={() => setShowNew(false)} onSave={addNew} cats={cats.filter(c => c !== 'todos')} />}
    </div>
  );
};

const catColor = (c) => ({
  Vacunas: '#A3007B',
  Antiparasitarios: '#1F8A5B',
  Medicación: '#D97706',
  Servicios: '#7A3FBF',
  Estudios: '#2D5BA0',
  Alimento: '#0E7490',
}[c] || '#888');

const KpiBox = ({ label, value, icon, color }) => (
  <div style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, padding: 14, display: 'flex', alignItems: 'center', gap: 12 }}>
    <div style={{ width: 38, height: 38, borderRadius: 9, background: color + '14', color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      {React.cloneElement(icon, { size: 18 })}
    </div>
    <div>
      <div style={{ fontSize: 11, color: '#888', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 800, marginTop: 2, color: '#1A1A1A' }}>{value}</div>
    </div>
  </div>
);

const EditableCell = ({ value, onSave, type = 'text', align = 'left', bold, muted, placeholder, saved }) => {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value);
  useEffect(() => setV(value), [value]);
  const fmt = (val) => type === 'money' ? '$' + (val || 0).toLocaleString('es-AR') : (val ?? placeholder ?? '—');
  if (editing) {
    return (
      <input autoFocus value={v ?? ''} onChange={(e) => setV(e.target.value)}
        onBlur={() => { setEditing(false); if (v !== value) onSave(v); }}
        onKeyDown={(e) => { if (e.key === 'Enter') { e.target.blur(); } if (e.key === 'Escape') { setV(value); setEditing(false); } }}
        type={type === 'money' || type === 'num' ? 'number' : 'text'}
        style={{ width: '100%', padding: '4px 8px', height: 28, border: '1.5px solid #A3007B', borderRadius: 6, fontSize: 13, fontFamily: 'inherit', background: 'white', outline: 'none', textAlign: align, fontWeight: bold ? 600 : 400 }} />
    );
  }
  return (
    <div onClick={() => setEditing(true)} title="Editar" style={{ position: 'relative', padding: '4px 8px', borderRadius: 6, cursor: 'text', textAlign: align, fontWeight: bold ? 600 : 400, color: muted ? '#666' : '#1A1A1A', minHeight: 28, display: 'flex', alignItems: 'center', justifyContent: align === 'center' ? 'center' : (align === 'right' ? 'flex-end' : 'flex-start'), transition: 'background .1s' }}
      onMouseEnter={(e) => e.currentTarget.style.background = '#F4F0F2'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
      {fmt(value)}
      {saved && <span style={{ position: 'absolute', right: align === 'right' || align === 'center' ? -2 : 'auto', left: align === 'right' || align === 'center' ? 'auto' : -2, top: -2, color: '#1F8A5B', fontSize: 11 }}><IconCheck size={11} /></span>}
    </div>
  );
};

const NewProductModal = ({ onClose, onSave, cats }) => {
  const [data, setData] = useState({ nombre: '', categoria: cats[0] || 'Servicios', costo: 0, venta: 0, stock: null, unidad: 'unidad', proveedor: '' });
  const m = data.costo > 0 ? ((data.venta - data.costo) / data.costo * 100) : null;
  return (
    <Modal open={true} onClose={onClose} title="Nuevo producto" footer={
      <>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="primary" icon={<IconCheck />} onClick={() => onSave(data)} disabled={!data.nombre}>Crear</Btn>
      </>
    }>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Field label="Nombre"><Input autoFocus placeholder="Ej. Bravecto Plus felino" value={data.nombre} onChange={(e) => setData({ ...data, nombre: e.target.value })} /></Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Field label="Categoría">
            <select value={data.categoria} onChange={(e) => setData({ ...data, categoria: e.target.value })} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
              {cats.map(c => <option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Unidad"><Input value={data.unidad} onChange={(e) => setData({ ...data, unidad: e.target.value })} /></Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
          <Field label="Costo ($)"><Input type="number" value={data.costo} onChange={(e) => setData({ ...data, costo: +e.target.value })} /></Field>
          <Field label="Venta ($)"><Input type="number" value={data.venta} onChange={(e) => setData({ ...data, venta: +e.target.value })} /></Field>
          <Field label="Margen">
            <div style={{ height: 38, padding: '0 12px', borderRadius: 8, background: '#FAF1F7', display: 'flex', alignItems: 'center', fontWeight: 700, color: m === null ? '#888' : m >= 100 ? '#1F8A5B' : '#A3007B' }}>
              {m === null ? '—' : `+${m.toFixed(0)}%`}
            </div>
          </Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Field label="Stock"><Input type="number" placeholder="Sin stock" value={data.stock ?? ''} onChange={(e) => setData({ ...data, stock: e.target.value === '' ? null : +e.target.value })} /></Field>
          <Field label="Proveedor"><Input value={data.proveedor} onChange={(e) => setData({ ...data, proveedor: e.target.value })} /></Field>
        </div>
      </div>
    </Modal>
  );
};

window.Precios = Precios;
</script>


<script type="text/babel">
// Main App — composes all modules
const { useState, useEffect } = React;

const App = () => {
  const [t, setTweak] = window.useTweaks(/*EDITMODE-BEGIN*/{
    "primary": "#A3007B",
    "oxford": "#2B2B2B",
    "density": "comfortable",
    "showBrandWatermark": true,
    "syncBadge": true
  }/*EDITMODE-END*/);
  const [active, setActive] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [clientDrawer, setClientDrawer] = useState({ open: false, client: null });
  const [petDrawer, setPetDrawer] = useState({ open: false, pet: null });
  const [newConsulta, setNewConsulta] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [mensajeClientId, setMensajeClientId] = useState(null);

  useEffect(() => {
    setLoading(true);
    const tm = setTimeout(() => setLoading(false), 600);
    return () => clearTimeout(tm);
  }, [active]);

  // CSS variables from tweaks
  useEffect(() => {
    document.documentElement.style.setProperty('--brand', t.primary);
    document.documentElement.style.setProperty('--oxford', t.oxford);
  }, [t.primary, t.oxford]);

  const titles = {
    dashboard: { title: 'Resumen del día', breadcrumb: 'Inicio' },
    agenda: { title: 'Agenda', breadcrumb: 'Turnos' },
    clientes: { title: 'Clientes', breadcrumb: 'Personas' },
    pacientes: { title: 'Pacientes', breadcrumb: 'Mascotas' },
    consultas: { title: 'Consultas', breadcrumb: 'Historia clínica' },
    libreta: { title: 'Libreta sanitaria', breadcrumb: 'Paciente' },
    mensajes: { title: 'Mensajes', breadcrumb: 'Comunicación' },
    internacion: { title: 'Internación', breadcrumb: 'Pacientes' },
    precios: { title: 'Precios', breadcrumb: 'Administración' },
  };
  const cur = titles[active];

  const onAction = (a) => {
    if (a === 'consulta') setNewConsulta(true);
    if (a === 'search') setSearchOpen(true);
    if (a === 'internar') setActive('internacion');
  };

  return (
    <div data-screen-label={`Dr. Balbi · ${cur.title}`} style={{
      width: '100%', height: '100vh', display: 'flex',
      background: '#FAFAF8', color: '#1A1A1A', overflow: 'hidden',
      fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, sans-serif',
      position: 'relative',
    }}>
      <Sidebar active={active} setActive={setActive} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
        <ActionBar title={cur.title} breadcrumb={cur.breadcrumb} onAction={onAction} />
        {/* Page content */}
        {active === 'dashboard' && <Dashboard goTo={setActive} openSearch={() => setSearchOpen(true)} />}
        {active === 'agenda' && <AgendaView />}
        {active === 'clientes' && <ClientesView loading={loading} openClient={(c) => setClientDrawer({ open: true, client: c })} openNew={() => setSearchOpen(true)} />}
        {active === 'pacientes' && <PacientesView loading={loading} openPet={(p) => setPetDrawer({ open: true, pet: p })} />}
        {active === 'consultas' && <ConsultasView />}
        {active === 'libreta' && <LibretaView />}
        {active === 'mensajes' && <MensajesView initialClientId={mensajeClientId} />}
        {active === 'internacion' && <InternacionView />}
        {active === 'precios' && <Precios />}

        {/* Drawers + modals (overlay this column only) */}
        <ClientDrawer client={clientDrawer.client} open={clientDrawer.open} onClose={() => setClientDrawer({ ...clientDrawer, open: false })} goToPet={(p) => { setClientDrawer({ ...clientDrawer, open: false }); setPetDrawer({ open: true, pet: p }); }} goToMensajes={(c) => { const m = MENSAJES.find(msg => CLIENTS.find(cl => cl.id === msg.clientId)?.id === c.id); setMensajeClientId(m?.id || null); setActive('mensajes'); }} />
        <PetDrawer pet={petDrawer.pet} open={petDrawer.open} onClose={() => setPetDrawer({ ...petDrawer, open: false })} goToConsultas={() => setActive('consultas')} goToLibreta={() => setActive('libreta')} />
        <NewConsultaModal open={newConsulta} onClose={() => setNewConsulta(false)} />
        <QuickSearchModal open={searchOpen} onClose={() => setSearchOpen(false)} openClient={(c) => { setSearchOpen(false); setClientDrawer({ open: true, client: c }); }} openPet={(p) => { setSearchOpen(false); setPetDrawer({ open: true, pet: p }); }} />
      </div>

      {/* Tweaks panel */}
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Identidad">
          <window.TweakColor label="Color primario" value={t.primary} onChange={(v) => setTweak('primary', v)} options={['#A3007B', '#7A005C', '#C2185B', '#6B21A8']} />
          <window.TweakColor label="Sidebar (oxford)" value={t.oxford} onChange={(v) => setTweak('oxford', v)} options={['#2B2B2B', '#1F1F1F', '#333333', '#3D2A36']} />
        </window.TweakSection>
        <window.TweakSection title="Comportamiento">
          <window.TweakToggle label="Badge sync Google Calendar" value={t.syncBadge} onChange={(v) => setTweak('syncBadge', v)} />
          <window.TweakToggle label="Marca de agua de fondo" value={t.showBrandWatermark} onChange={(v) => setTweak('showBrandWatermark', v)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
};

// Quick search modal (cmd-k style)
const QuickSearchModal = ({ open, onClose, openClient, openPet }) => {
  const [q, setQ] = useState('');
  const results = useMemo(() => {
    if (!q.trim()) return { clients: CLIENTS.slice(0, 4), pets: PETS.slice(0, 4) };
    const ql = q.toLowerCase();
    return {
      clients: CLIENTS.filter(c => c.name.toLowerCase().includes(ql) || c.dni.includes(q)).slice(0, 6),
      pets: PETS.filter(p => p.name.toLowerCase().includes(ql)).slice(0, 6),
    };
  }, [q]);
  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(20,15,20,0.45)', opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', transition: 'opacity .2s', zIndex: 60, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 100 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: 560, background: 'white', borderRadius: 14, overflow: 'hidden', boxShadow: '0 24px 60px rgba(0,0,0,0.25)', transform: open ? 'translateY(0)' : 'translateY(-20px)', transition: 'transform .2s' }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid #EFEAEE', display: 'flex', alignItems: 'center', gap: 10 }}>
            <IconSearch size={18} style={{ color: '#A3007B' }} />
            <input autoFocus value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar dueño, mascota, DNI, teléfono…" style={{ flex: 1, border: 'none', outline: 'none', fontSize: 16, fontFamily: 'inherit' }} />
            <kbd style={{ fontSize: 10, padding: '3px 6px', background: '#F4F0F2', borderRadius: 4, color: '#888', fontFamily: 'inherit' }}>ESC</kbd>
          </div>
          <div style={{ maxHeight: 400, overflow: 'auto' }}>
            {results.clients.length > 0 && <>
              <div style={{ padding: '10px 18px 4px', fontSize: 11, color: '#888', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>Clientes</div>
              {results.clients.map(c => (
                <div key={c.id} onClick={() => openClient(c)} style={{ padding: '10px 18px', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }}
                  onMouseEnter={(e) => e.currentTarget.style.background = '#FAF1F7'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'white'}>
                  <Avatar name={c.name} size={28} />
                  <div style={{ flex: 1, fontSize: 13 }}>
                    <strong>{c.name}</strong> <span style={{ color: '#888' }}>· {c.dni} · {c.phone}</span>
                  </div>
                </div>
              ))}
            </>}
            {results.pets.length > 0 && <>
              <div style={{ padding: '10px 18px 4px', fontSize: 11, color: '#888', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, borderTop: '1px solid #F4F0F2', marginTop: 6 }}>Pacientes</div>
              {results.pets.map(p => {
                const o = CLIENTS.find(c => c.id === p.ownerId);
                return (
                  <div key={p.id} onClick={() => openPet(p)} style={{ padding: '10px 18px', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }}
                    onMouseEnter={(e) => e.currentTarget.style.background = '#FAF1F7'}
                    onMouseLeave={(e) => e.currentTarget.style.background = 'white'}>
                    <PetAvatar pet={p} size={28} />
                    <div style={{ flex: 1, fontSize: 13 }}>
                      <strong>{p.name}</strong> <span style={{ color: '#888' }}>· {p.species} · {p.breed} · {o?.name}</span>
                    </div>
                  </div>
                );
              })}
            </>}
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>


</body>
</html>
