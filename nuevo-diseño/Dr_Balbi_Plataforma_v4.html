    0 2px 6px rgba(0,0,0,.15)}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ─── Ingresos por tipo · barras apiladas ─────────────────────────────
const IngresosChart = () => {
  const tipos = [
    { key: 'urgencias', label: 'Urgencias', color: '#A3007B' },
    { key: 'controles', label: 'Controles', color: '#D97706' },
    { key: 'cirugias', label: 'Cirugías', color: '#1F8A5B' },
    { key: 'vacunaciones', label: 'Vacunaciones', color: '#2D5BA0' },
  ];
  const data = [
    { sem: 'Sem 1', urgencias: 18, controles: 24, cirugias: 6, vacunaciones: 12 },
    { sem: 'Sem 2', urgencias: 22, controles: 28, cirugias: 8, vacunaciones: 14 },
    { sem: 'Sem 3', urgencias: 15, controles: 31, cirugias: 5, vacunaciones: 18 },
    { sem: 'Sem 4', urgencias: 26, controles: 27, cirugias: 9, vacunaciones: 11 },
  ];
  const [hover, setHover] = useStateD(null);

  const W = 760, H = 280;
  const padL = 44, padR = 20, padT = 24, padB = 44;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const totals = data.map(d => d.urgencias + d.controles + d.cirugias + d.vacunaciones);
  const maxRaw = Math.max(...totals);
  const niceMax = Math.ceil(maxRaw / 10) * 10;
  const yTicks = 5;
  const yStep = niceMax / yTicks;
  const barW = innerW / data.length * 0.5;
  const gap = innerW / data.length;

  return (
    <div style={{ background: '#FAFAF8', border: '1px solid #EFEAEE', borderRadius: 12, padding: '18px 20px', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: '#1A1A1A' }}>Ingresos por tipo — últimas 4 semanas</div>
          <div style={{ fontSize: 11.5, color: '#888', marginTop: 2 }}>{totals.reduce((s, v) => s + v, 0)} consultas totales · promedio {(totals.reduce((s,v)=>s+v,0)/4).toFixed(0)}/sem</div>
        </div>
      </div>

      <div style={{ position: 'relative' }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: 'block', overflow: 'visible' }}>
          {/* Grid lines + Y axis labels */}
          {Array.from({ length: yTicks + 1 }, (_, i) => {
            const y = padT + innerH - (i * innerH) / yTicks;
            const val = Math.round(i * yStep);
            return (
              <g key={i}>
                <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#E8E2E5" strokeWidth="1" strokeDasharray={i === 0 ? '0' : '2 3'} />
                <text x={padL - 8} y={y + 4} fontSize="11" fill="#999" textAnchor="end" fontFamily="ui-monospace, monospace">{val}</text>
              </g>
            );
          })}

          {/* Bars */}
          {data.map((d, i) => {
            const cx = padL + gap * (i + 0.5);
            const x = cx - barW / 2;
            let acc = 0;
            const segs = tipos.map(t => {
              const v = d[t.key];
              const h = (v / niceMax) * innerH;
              const yTop = padT + innerH - acc - h;
              acc += h;
              return { ...t, v, h, yTop };
            });
            const isHover = hover === i;
            return (
              <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: 'pointer' }}>
                {/* Invisible hover target */}
                <rect x={cx - gap / 2} y={padT} width={gap} height={innerH} fill="transparent" />
                {segs.map((s, j) => (
                  <rect key={s.key} x={x} y={s.yTop} width={barW} height={s.h}
                    fill={s.color}
                    opacity={hover != null && hover !== i ? 0.35 : 1}
                    rx={j === 0 ? 3 : 0} ry={j === 0 ? 3 : 0}
                    style={{ transition: 'opacity .15s' }}
                  />
                ))}
                {/* Total on top when hover */}
                {isHover && (
                  <text x={cx} y={padT + innerH - segs.reduce((s, x) => s + x.h, 0) - 8} textAnchor="middle" fontSize="12" fontWeight="700" fill="#1A1A1A" fontFamily="ui-monospace, monospace">
                    {totals[i]}
                  </text>
                )}
                {/* X label */}
                <text x={cx} y={H - padB + 18} textAnchor="middle" fontSize="12" fontWeight={isHover ? 700 : 600} fill={isHover ? '#A3007B' : '#666'}>{d.sem}</text>
              </g>
            );
          })}
        </svg>

        {/* Tooltip */}
        {hover != null && (() => {
          const d = data[hover];
          const cx = padL + gap * (hover + 0.5);
          const xPct = (cx / W) * 100;
          return (
            <div style={{
              position: 'absolute', left: `${xPct}%`, top: 6, transform: 'translateX(-50%)',
              background: 'white', border: '1px solid #E8E2E5', borderRadius: 8, padding: '8px 12px',
              boxShadow: '0 6px 18px -6px rgba(0,0,0,0.15)', pointerEvents: 'none', minWidth: 160, zIndex: 2,
            }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#1A1A1A', marginBottom: 6, display: 'flex', justifyContent: 'space-between' }}>
                <span>{d.sem}</span>
                <span style={{ fontFamily: 'ui-monospace, monospace', color: '#A3007B' }}>{totals[hover]} total</span>
              </div>
              {tipos.map(t => (
                <div key={t.key} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, padding: '2px 0' }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: t.color }} />
                  <span style={{ color: '#666', flex: 1 }}>{t.label}</span>
                  <span style={{ fontFamily: 'ui-monospace, monospace', fontWeight: 600, color: '#1A1A1A' }}>{d[t.key]}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </div>

      {/* Legend */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 22, marginTop: 6, flexWrap: 'wrap' }}>
        {tipos.map(t => (
          <span key={t.key} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11.5, color: '#555', fontWeight: 600 }}>
            <span style={{ width: 12, height: 12, borderRadius: 3, background: t.color }} />
            {t.label}
          </span>
        ))}
      </div>
    </div>
  );
};

const PacientesView = ({ loading, openPet }) => {
  const [q, setQ] = useState('');

          <div style={{ display: 'flex', gap: 4, background: '#F4F0F2', padding: 3, borderRadius: 8 }}>
            {['todos', 'Canino', 'Felino', 'Conejo', 'Ave'].map(s => (
              <button key={s} onClick={() => setSpecies(s)} style={{
                padding: '6px 12px', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600,
                background: species === s ? 'white' : 'transparent',
                color: species === s ? '#A3007B' : '#666',

                  <span>{owner?.name.split(' ')[0]}</span>

      {tabPac === 'fallecidos' && (
        <>

        </Modal>
      )}

      {confirmDel && (
        <Modal open={true} onClose={() => setConfirmDel(null)} title="Eliminar registro" width={420}
          footer={<><Btn variant="ghost" onClick={() => setConfirmDel(null)}>Cancelar</Btn><Btn variant="danger" icon={<IconTrash />} onClick={() => removeFall(confirmDel.id)}>Eliminar definitivamente</Btn></>}>

};

<script type="text/babel">

// drawers.jsx
// Internación + Drawers (cliente / paciente)
const { useState: useStateD2 } = React;
const useState = useStateD2;
const InternacionView = () => {
  const [boxes, setBoxes] = useState(window.BOXES_INIT);
  const [editing, setEditing] = useState(null);
  const [newBox, setNewBox] = useState(false);
  const [confirmAlta, setConfirmAlta] = useState(null);

  const updateBox = (id, patch) => setBoxes(boxes.map(b => b.id === id ? { ...b, ...patch } : b));
  const addControl = (boxId, control) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: [...b.controles, control] } : b));
    setEditing(null);
  };
  const editControl = (boxId, idx, control) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: b.controles.map((r, i) => i === idx ? control : r) } : b));
    setEditing(null);
  };
  const deleteControl = (boxId, idx) => {
    setBoxes(boxes.map(b => b.id === boxId ? { ...b, controles: b.controles.filter((_, i) => i !== idx) } : b));
  };
  const dischargeBox = (id) => { setBoxes(boxes.filter(b => b.id !== id)); setConfirmAlta(null); };
  const addBox = (data) => { setBoxes([...boxes, { ...data, id: Math.max(0, ...boxes.map(b => b.id)) + 1, controles: [] }]); setNewBox(false); };

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 16, overflow: 'auto', flex: 1 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ fontSize: 13, color: '#666' }}><strong style={{ color: '#1A1A1A' }}>{boxes.length}</strong> pacientes en internación</div>
        <div style={{ flex: 1 }} />
        <Btn variant="primary" size="md" icon={<IconPlus />} onClick={() => setNewBox(true)}>Internar paciente</Btn>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
        {boxes.map(b => {
          const p = PETS.find(x => x.id === b.petId);
          const owner = p ? CLIENTS.find(c => c.id === p.ownerId) : null;
          const last = b.controles[b.controles.length - 1];
          return (
            <div key={b.id} style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, padding: 18 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {p ? <PetAvatar pet={p} size={48} /> : <div style={{ width: 48, height: 48, borderRadius: 24, background: '#F4F0F2' }} />}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{p?.name || 'Paciente'} <span style={{ color: '#888', fontWeight: 500, fontSize: 13 }}>· Box {b.id}</span></div>
                  <div style={{ fontSize: 12, color: '#888' }}>{p?.species} · {p?.breed} · {owner?.name}</div>
                </div>
                <Pill color={b.estado === 'estable' ? '#1F8A5B' : b.estado === 'crítico' ? '#C2185B' : '#D97706'}>{b.estado}</Pill>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 14 }}>
                <Vital label="T° últ." value={last ? `${last.t}°C` : '—'} icon={<IconActivity />} color={last && last.t > 39 ? '#C2185B' : '#1F8A5B'} />
                <Vital label="FC" value={last ? last.fc : '—'} icon={<IconHeart />} />
                <Vital label="FR" value={last ? last.fr : '—'} icon={<IconActivity />} />
                <Vital label="Ingreso" value={b.ingreso.split(' ')[0].slice(5)} icon={<IconClock />} />
              </div>
              <div style={{ marginTop: 14, padding: 12, background: '#FAFAF8', borderRadius: 10, fontSize: 12, color: '#555', lineHeight: 1.5 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                  <strong>Plan terapéutico</strong>
                  <button onClick={() => setEditing({ mode: 'plan', boxId: b.id })} style={{ background: 'transparent', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'inherit' }}><IconEdit size={11} /> Editar</button>
                </div>
                {b.plan} · <em>Dieta:</em> {b.dieta}
              </div>

              <div style={{ marginTop: 14 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: 0.4 }}>Hoja de evolución ({b.controles.length})</div>
                  <button onClick={() => setEditing({ mode: 'control', boxId: b.id })} style={{ background: '#FAF1F7', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 700, cursor: 'pointer', padding: '4px 10px', borderRadius: 999, display: 'flex', alignItems: 'center', gap: 4, fontFamily: 'inherit' }}><IconPlus size={11} /> Registrar control</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, maxHeight: 200, overflow: 'auto' }}>
                  {b.controles.map((r, i) => (
                    <div key={i} style={{ display: 'grid', gridTemplateColumns: '60px 1fr auto', gap: 10, padding: '8px 10px', background: '#FAFAF8', borderRadius: 8, fontSize: 12, alignItems: 'flex-start' }}>
                      <div style={{ fontWeight: 700, color: '#A3007B' }}>{r.hora}</div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ display: 'flex', gap: 10, color: '#444', fontWeight: 600, marginBottom: 2 }}>
                          <span>T° {r.t}</span><span>FC {r.fc}</span><span>FR {r.fr}</span>
                        </div>
                        <div style={{ color: '#666', lineHeight: 1.4 }}>{r.obs}</div>
                        <div style={{ fontSize: 10.5, color: '#999', marginTop: 2 }}>— {r.autor}</div>
                      </div>
                      <div style={{ display: 'flex', gap: 2 }}>
                        <button title="Editar" onClick={() => setEditing({ mode: 'control', boxId: b.id, idx: i, control: r })} style={iconBtn2}><IconEdit size={11} /></button>
                        <button title="Eliminar" onClick={() => deleteControl(b.id, i)} style={{ ...iconBtn2, color: '#C2185B' }}><IconTrash size={11} /></button>
                      </div>
                    </div>
                  ))}
                  {b.controles.length === 0 && <div style={{ padding: '16px 0', textAlign: 'center', color: '#999', fontSize: 12 }}>Sin registros aún</div>}
                </div>
              </div>

              <div style={{ display: 'flex', gap: 6, marginTop: 14 }}>
                <Btn variant="secondary" size="sm" icon={<IconEdit />} style={{ flex: 1 }} onClick={() => setEditing({ mode: 'box', boxId: b.id, box: b })}>Editar internación</Btn>
                <Btn variant="primary" size="sm" icon={<IconCheck />} style={{ flex: 1 }} onClick={() => setConfirmAlta(b)}>Dar de alta</Btn>
              </div>
            </div>
          );
        })}
        {boxes.length === 0 && (
          <div style={{ gridColumn: '1 / -1', padding: 60, textAlign: 'center', color: '#888', background: 'white', border: '1px dashed #E0DCE0', borderRadius: 12 }}>
            <IconBed size={32} style={{ color: '#D4C8CE', marginBottom: 8 }} />
            <div style={{ fontSize: 14, fontWeight: 600, color: '#666' }}>No hay pacientes internados</div>
            <div style={{ fontSize: 12, marginTop: 4 }}>Hacé clic en "Internar paciente" para empezar</div>
          </div>
        )}
      </div>

      {editing?.mode === 'control' && <ControlModal boxId={editing.boxId} initial={editing.control} idx={editing.idx} onClose={() => setEditing(null)} onSave={(c) => editing.idx != null ? editControl(editing.boxId, editing.idx, c) : addControl(editing.boxId, c)} />}
      {editing?.mode === 'plan' && <PlanModal box={boxes.find(b => b.id === editing.boxId)} onClose={() => setEditing(null)} onSave={(patch) => { updateBox(editing.boxId, patch); setEditing(null); }} />}
      {editing?.mode === 'box' && <BoxModal box={editing.box} onClose={() => setEditing(null)} onSave={(patch) => { updateBox(editing.boxId, patch); setEditing(null); }} onDelete={() => dischargeBox(editing.boxId)} />}
      {newBox && <BoxModal onClose={() => setNewBox(false)} onSave={addBox} isNew />}
      {confirmAlta && (
        <Modal open={true} onClose={() => setConfirmAlta(null)} title="Dar de alta" width={420}
          footer={<><Btn variant="ghost" onClick={() => setConfirmAlta(null)}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => dischargeBox(confirmAlta.id)}>Confirmar alta</Btn></>}>
          <div style={{ fontSize: 13.5, color: '#444', lineHeight: 1.6 }}>
            ¿Dar de alta a <strong>{PETS.find(p => p.id === confirmAlta.petId)?.name}</strong>? Se cerrará la hoja de evolución y se moverá a la historia clínica.
          </div>
        </Modal>
      )}
    </div>
  );
};

const iconBtn2 = { background: 'transparent', border: 'none', color: '#888', cursor: 'pointer', padding: 4, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center' };

const ControlModal = ({ boxId, initial, idx, onClose, onSave }) => {
  const now = new Date();
  const [c, setC] = useState(initial || { hora: now.toTimeString().slice(0,5), t: 38.5, fc: 90, fr: 22, obs: '', autor: 'Dr. Balbi' });
  return (
    <Modal open={true} onClose={onClose} title={idx != null ? 'Editar control' : 'Registrar control'}
      footer={<><Btn variant="ghost" onClick={onClose}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => onSave(c)}>{idx != null ? 'Guardar cambios' : 'Registrar'}</Btn></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10 }}>
          <Field label="Hora"><Input value={c.hora} onChange={(e) => setC({ ...c, hora: e.target.value })} /></Field>
          <Field label="T° (°C)"><Input type="number" step="0.1" value={c.t} onChange={(e) => setC({ ...c, t: +e.target.value })} /></Field>
          <Field label="FC (lpm)"><Input type="number" value={c.fc} onChange={(e) => setC({ ...c, fc: +e.target.value })} /></Field>
          <Field label="FR (rpm)"><Input type="number" value={c.fr} onChange={(e) => setC({ ...c, fr: +e.target.value })} /></Field>
        </div>
        <Field label="Observaciones">
          <textarea value={c.obs} onChange={(e) => setC({ ...c, obs: e.target.value })} rows={4} placeholder="Estado general, apetito, hidratación, evolución de la herida…"
            style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 13.5, fontFamily: 'inherit', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }} />
        </Field>
        <Field label="Profesional"><Input value={c.autor} onChange={(e) => setC({ ...c, autor: e.target.value })} /></Field>
      </div>
    </Modal>
  );
};

const PlanModal = ({ box, onClose, onSave }) => {
  const [data, setData] = useState({ plan: box.plan, dieta: box.dieta, estado: box.estado });
  return (
    <Modal open={true} onClose={onClose} title="Editar plan terapéutico"
      footer={<><Btn variant="ghost" onClick={onClose}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => onSave(data)}>Guardar</Btn></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Field label="Estado">
          <div style={{ display: 'flex', gap: 6 }}>
            {['estable', 'observación', 'crítico'].map(s => (
              <button key={s} onClick={() => setData({ ...data, estado: s })} style={{ flex: 1, padding: '8px 10px', borderRadius: 8, border: data.estado === s ? '2px solid #A3007B' : '1px solid #E0DCE0', background: data.estado === s ? '#FAF1F7' : 'white', fontWeight: data.estado === s ? 700 : 500, color: data.estado === s ? '#A3007B' : '#666', cursor: 'pointer', fontFamily: 'inherit', fontSize: 12.5, textTransform: 'capitalize' }}>{s}</button>
            ))}
          </div>
        </Field>
        <Field label="Plan / medicación">
          <textarea value={data.plan} onChange={(e) => setData({ ...data, plan: e.target.value })} rows={3} style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 13.5, fontFamily: 'inherit', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }} />
        </Field>
        <Field label="Dieta">
          <Input value={data.dieta} onChange={(e) => setData({ ...data, dieta: e.target.value })} />
        </Field>
      </div>
    </Modal>
  );
};

const BoxModal = ({ box, onClose, onSave, onDelete, isNew }) => {
  const now = new Date();
  const [data, setData] = useState(box || { petId: PETS.filter(p => p.status === 'activo')[0]?.id || 1, ingreso: now.toISOString().slice(0,16).replace('T',' '), motivo: '', estado: 'estable', dieta: '', plan: '', ubicacion: 'Box 1' });
  const [ubicacionCustom, setUbicacionCustom] = useState(false);
  const presets = ['Box 1','Box 2','Box 3','Box 4','Terapia intensiva','Aislamiento','Cirugía — recuperación'];
  return (
    <Modal open={true} onClose={onClose} title={isNew ? 'Nueva internación' : 'Editar internación'} width={560}
      footer={<>
        {!isNew && onDelete && <Btn variant="danger" icon={<IconTrash />} onClick={() => { onDelete(); onClose(); }} style={{ marginRight: 'auto' }}>Eliminar</Btn>}
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="primary" icon={<IconCheck />} onClick={() => onSave(data)} disabled={!data.motivo}>{isNew ? 'Internar' : 'Guardar'}</Btn>
      </>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {isNew && (
          <Field label="Paciente">
            <select value={data.petId} onChange={(e) => setData({ ...data, petId: +e.target.value })} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
              {PETS.filter(p => p.status === 'activo').map(p => {
                const o = CLIENTS.find(c => c.id === p.ownerId);
                return <option key={p.id} value={p.id}>{p.name} — {o?.name}</option>;
              })}
            </select>
          </Field>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Field label="Ubicación / Box">
            {!ubicacionCustom ? (
              <div style={{ display: 'flex', gap: 6 }}>
                <select value={presets.includes(data.ubicacion) ? data.ubicacion : ''} onChange={(e) => setData({ ...data, ubicacion: e.target.value })} style={{ flex: 1, height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
                  {presets.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
                <button onClick={() => setUbicacionCustom(true)} title="Escribir otro" style={{ height: 38, padding: '0 10px', borderRadius: 8, border: '1px solid #E0DCE0', background: 'white', color: '#666', cursor: 'pointer', fontSize: 12, fontFamily: 'inherit', whiteSpace: 'nowrap' }}>Otro</button>
              </div>
            ) : (
              <div style={{ display: 'flex', gap: 6 }}>
                <Input autoFocus value={data.ubicacion} onChange={(e) => setData({ ...data, ubicacion: e.target.value })} placeholder="Ej. Sala 3, UCI" />
                <button onClick={() => setUbicacionCustom(false)} style={{ height: 38, padding: '0 10px', borderRadius: 8, border: '1px solid #E0DCE0', background: 'white', color: '#666', cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' }}>↩</button>
              </div>
            )}
          </Field>
          <Field label="Ingreso"><Input value={data.ingreso} onChange={(e) => setData({ ...data, ingreso: e.target.value })} placeholder="2026-05-09 14:00" /></Field>
          <Field label="Estado">
            <select value={data.estado} onChange={(e) => setData({ ...data, estado: e.target.value })} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none' }}>
              <option value="estable">Estable</option><option value="observación">Observación</option><option value="crítico">Crítico</option>
            </select>
          </Field>
        </div>
        <Field label="Motivo de internación">
          <Input value={data.motivo} onChange={(e) => setData({ ...data, motivo: e.target.value })} placeholder="Ej. Post-quirúrgico ortopedia, gastroenteritis aguda…" />
        </Field>
        <Field label="Plan terapéutico">
          <textarea value={data.plan} onChange={(e) => setData({ ...data, plan: e.target.value })} rows={3} placeholder="Medicación, frecuencia y dosis" style={{ width: '100%', padding: 12, borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 13.5, fontFamily: 'inherit', outline: 'none', resize: 'vertical', boxSizing: 'border-box' }} />
        </Field>
        <Field label="Dieta"><Input value={data.dieta} onChange={(e) => setData({ ...data, dieta: e.target.value })} placeholder="Ej. Blanda fraccionada x 4" /></Field>
      </div>
    </Modal>
  );
};

const ClientDrawer = ({ client, open, onClose, goToPet, goToMensajes }) => {
  if (!client) return null;
  const pets = PETS.filter(p => client.pets.includes(p.id));
  const [editMode, setEditMode] = React.useState(false);
  const [form, setForm] = React.useState(client);
  React.useEffect(() => { setForm(client); setEditMode(false); }, [client]);
  const selStyle2 = { height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%', background: 'white' };
  return (
    <Drawer open={open} onClose={onClose} title={editMode ? "Editar cliente" : "Ficha del cliente"} footer={
      <>
        <Btn variant="ghost" onClick={() => { if (editMode) setEditMode(false); else onClose(); }}>{editMode ? 'Cancelar' : 'Cerrar'}</Btn>
        {!editMode && <Btn variant="secondary" icon={<IconEdit />} onClick={() => setEditMode(true)}>Editar</Btn>}
        {editMode && <Btn variant="primary" icon={<IconCheck />} onClick={() => setEditMode(false)}>Guardar cambios</Btn>}
        {!editMode && <Btn variant="primary" icon={<IconChat />} onClick={() => { onClose(); goToMensajes && goToMensajes(client); }}>Mensaje</Btn>}

      {!editMode ? (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <Avatar name={client.name} size={56} />
            <div>
              <div style={{ fontSize: 18, fontWeight: 700 }}>{client.name}</div>
              <div style={{ fontSize: 12, color: '#888' }}>DNI {client.dni}</div>
              {client.coOwner && <div style={{ fontSize: 12, color: '#888', marginTop: 2 }}>Co-responsable: {client.coOwner}</div>}
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 18 }}>
            <InfoTile icon={<IconPhone />} label="Teléfono" value={client.phone} />
            <InfoTile icon={<IconMail />} label="Email" value={client.email} />
            <InfoTile icon={<IconMapPin />} label="Domicilio" value={client.address} />
            <InfoTile icon={<IconCalendar />} label="Última visita" value={client.lastVisit} />
          </div>

<script type="text/babel">
// Consultas: timeline + autosave + Libreta cards + Mensajes chat + Agenda Google-Calendar style
const ConsultaTimeline = ({ pet, openNewConsulta }) => {
  const [consultasList, setConsultasList] = useState(CONSULTAS.filter(c => c.petId === pet.id).sort((a, b) => b.date.localeCompare(a.date)));
  const [selected, setSelected] = useState(consultasList[0]?.id);
  const sel = consultasList.find(c => c.id === selected) || consultasList[0];
  const [anam, setAnam] = useState(sel?.anamnesis || '');
  const [diag, setDiag] = useState(sel?.diagnostico || '');
  const [trat, setTrat] = useState(sel?.tratamiento || '');
  const [savedField, setSavedField] = useState(null);
  const [editingVitals, setEditingVitals] = useState(false);
  const [vitals, setVitals] = useState({ peso: sel?.peso, temp: sel?.temp, fc: sel?.fc, estado: sel?.estado || 'Estable' });
  const [adjuntarModal, setAdjuntarModal] = useState(false);
  const [recetaModal, setRecetaModal] = useState(false);

  useEffect(() => {
    const s = consultasList.find(c => c.id === selected) || consultasList[0];
    setAnam(s?.anamnesis || '');
    setDiag(s?.diagnostico || '');
    setTrat(s?.tratamiento || '');
    setVitals({ peso: s?.peso, temp: s?.temp, fc: s?.fc, estado: s?.estado || 'Estable' });
  }, [selected, consultasList]);

  const triggerSave = (field) => { setSavedField(field); setTimeout(() => setSavedField(null), 1800); };

  const saveCurrentConsulta = () => {
    setConsultasList(consultasList.map(c => c.id === sel?.id ? { ...c, anamnesis: anam, diagnostico: diag, tratamiento: trat, ...vitals } : c));
    triggerSave('all');
  };

  const addConsultaToList = (newC) => {
    setConsultasList([newC, ...consultasList]);
    setSelected(newC.id);
  };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 0, height: '100%', overflow: 'hidden' }}>
      {/* Timeline column */}
      <div style={{ borderRight: '1px solid #EFEAEE', overflow: 'auto', padding: '20px 18px', background: '#FAFAF8' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A' }}>Historia clínica</div>
          <Btn size="sm" icon={<IconPlus />} onClick={openNewConsulta}>Nueva</Btn>
        </div>
        <div style={{ position: 'relative', paddingLeft: 18 }}>
          <div style={{ position: 'absolute', left: 6, top: 6, bottom: 6, width: 2, background: '#EFE4EC' }} />
          {consultasList.map((c, i) => (
            <div key={c.id} onClick={() => setSelected(c.id)} style={{
              position: 'relative', padding: '10px 12px', marginBottom: 8, borderRadius: 8, cursor: 'pointer',
              background: selected === c.id ? 'white' : 'transparent',
              border: selected === c.id ? '1px solid #E5C5DC' : '1px solid transparent',
              boxShadow: selected === c.id ? '0 2px 8px rgba(163,0,123,0.06)' : 'none',
            }}>
              <div style={{ position: 'absolute', left: -18, top: 14, width: 14, height: 14, borderRadius: '50%', background: selected === c.id ? '#A3007B' : 'white', border: `2px solid ${selected === c.id ? '#A3007B' : '#D4BFCB'}` }} />
              <div style={{ fontSize: 11, color: '#888', fontWeight: 600 }}>{c.date} · {c.time}</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1A1A1A', marginTop: 2 }}>{c.motivo}</div>
              <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{c.vet}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Detail column */}
      <div style={{ overflow: 'auto', padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
            <div style={{ fontSize: 20, fontWeight: 700 }}>{sel?.motivo}</div>
            <Pill color="#A3007B">en edición</Pill>
          </div>
          <div style={{ fontSize: 12, color: '#888' }}>{sel?.date} · {sel?.time} · {sel?.vet}</div>
        </div>
        {/* Vitals strip */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#666', textTransform: 'uppercase', letterSpacing: 0.4 }}>Signos vitales</div>
            <button onClick={() => setEditingVitals(!editingVitals)} style={{ background: 'transparent', border: 'none', color: '#A3007B', fontSize: 11, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'inherit' }}>
              <IconEdit size={11} /> {editingVitals ? 'Listo' : 'Editar'}
            </button>
          </div>
          {!editingVitals ? (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <Vital label="Peso" value={`${vitals.peso} kg`} icon={<IconActivity />} />
              <Vital label="Temperatura" value={`${vitals.temp}°C`} icon={<IconActivity />} />
              <Vital label="FC" value={`${vitals.fc} bpm`} icon={<IconHeart />} />
              <Vital label="Estado" value={vitals.estado} icon={<IconCheckCircle />} color={vitals.estado === 'Estable' ? '#1F8A5B' : vitals.estado === 'Crítico' ? '#C2185B' : '#D97706'} />
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <Field label="Peso (kg)"><Input type="number" step="0.1" value={vitals.peso} onChange={(e) => setVitals({...vitals, peso: +e.target.value})} /></Field>
              <Field label="Temperatura (°C)"><Input type="number" step="0.1" value={vitals.temp} onChange={(e) => setVitals({...vitals, temp: +e.target.value})} /></Field>
              <Field label="FC (bpm)"><Input type="number" value={vitals.fc} onChange={(e) => setVitals({...vitals, fc: +e.target.value})} /></Field>
              <Field label="Estado">
                <select value={vitals.estado} onChange={(e) => setVitals({...vitals, estado: e.target.value})} style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%' }}>
                  <option>Estable</option><option>Observación</option><option>Crítico</option><option>En alta</option>
                </select>
              </Field>
            </div>
          )}
        </div>
        <Field label="Anamnesis" autosaved={savedField === 'anam'}>
          <textarea value={anam} onChange={(e) => { setAnam(e.target.value); triggerSave('anam'); }} rows={3} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5 }} onFocus={(e) => e.target.style.borderColor = '#A3007B'} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <Field label="Diagnóstico" autosaved={savedField === 'diag'}>
          <textarea value={diag} onChange={(e) => { setDiag(e.target.value); triggerSave('diag'); }} rows={2} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5 }} onFocus={(e) => e.target.style.borderColor = '#A3007B'} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <Field label="Tratamiento" autosaved={savedField === 'trat'}>
          <textarea value={trat} onChange={(e) => { setTrat(e.target.value); triggerSave('trat'); }} rows={3} style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none', lineHeight: 1.5 }} onFocus={(e) => e.target.style.borderColor = '#A3007B'} onBlur={(e) => e.target.style.borderColor = '#E0DCE0'} />
        </Field>
        <div style={{ display: 'flex', gap: 8, paddingTop: 8 }}>
          <Btn variant="secondary" icon={<IconFile />} onClick={() => setAdjuntarModal(true)}>Adjuntar estudio</Btn>
          <Btn variant="secondary" icon={<IconPill />} onClick={() => setRecetaModal(true)}>Generar receta</Btn>
          <div style={{ flex: 1 }} />
          <Btn variant="primary" icon={<IconCheck />} onClick={saveCurrentConsulta}>Guardar consulta</Btn>
        </div>
      </div>

      {/* Adjuntar estudio modal */}
      {adjuntarModal && (
        <Modal open={true} onClose={() => setAdjuntarModal(false)} title="Adjuntar estudio" width={460}
          footer={<><Btn variant="ghost" onClick={() => setAdjuntarModal(false)}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={() => { setAdjuntarModal(false); }}>Adjuntar</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Field label="Tipo de estudio">
              <select style={{ height: 38, padding: '0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 14, fontFamily: 'inherit', outline: 'none', width: '100%' }}>
                <option>Hemograma completo</option><option>Perfil hepático</option><option>Perfil renal</option><option>Rx torácica</option><option>Ecografía abdominal</option><option>Otro</option>
              </select>
            </Field>
            <Field label="Archivo (PDF o imagen)">
              <div style={{ border: '2px dashed #E0DCE0', borderRadius: 8, padding: '28px 16px', textAlign: 'center', color: '#888', fontSize: 13, cursor: 'pointer', background: '#FAFAF8' }}>
                <div style={{ fontSize: 24, marginBottom: 6 }}>📎</div>
                <div>Arrastrá un archivo o hacé clic para seleccionar</div>
                <div style={{ fontSize: 11, marginTop: 4, color: '#AAA' }}>PDF, JPG, PNG — máx. 10 MB</div>
              </div>
            </Field>
            <Field label="Observaciones"><Input placeholder="Descripción breve del estudio…" /></Field>
          </div>
        </Modal>
      )}

      {/* Generar receta modal */}
      {recetaModal && (
        <Modal open={true} onClose={() => setRecetaModal(false)} title="Generar receta" width={500}
          footer={<><Btn variant="ghost" onClick={() => setRecetaModal(false)}>Cancelar</Btn><Btn variant="primary" icon={<IconFile />} onClick={() => { setRecetaModal(false); }}>Generar PDF</Btn></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ padding: 12, background: '#FAF1F7', borderRadius: 8, fontSize: 12.5, color: '#A3007B', fontWeight: 600 }}>
              Paciente: {pet?.name} — {CLIENTS.find(c => c.id === pet?.ownerId)?.name}
            </div>
            <Field label="Medicamento 1"><Input placeholder="Ej. Meloxicam 1.5mg/ml" defaultValue={trat.split('\n')[0] || ''} /></Field>
            <Field label="Dosis y frecuencia"><Input placeholder="0.1 mg/kg SID por 5 días" /></Field>
            <Field label="Medicamento 2 (opcional)"><Input placeholder="Ej. Cefalexina 500mg" /></Field>
            <Field label="Observaciones para el dueño"><textarea rows={2} placeholder="Administrar con comida. Consultar ante efectos adversos." style={{ width: '100%', padding: 12, border: '1px solid #E0DCE0', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', resize: 'vertical', outline: 'none' }} /></Field>
            <div style={{ padding: 10, background: '#F0FDF4', borderRadius: 8, fontSize: 12, color: '#1F8A5B' }}>
              Se generará un PDF con membrete de Dr. Balbi · Emergencias Veterinarias con firma digital.
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const Vital = ({ label, value, icon, color = '#A3007B' }) => (
  <div style={{ background: '#FAFAF8', border: '1px solid #EFEAEE', borderRadius: 10, padding: '10px 12px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: '#888', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
      {React.cloneElement(icon, { size: 12 })}{label}

    <div style={{ fontSize: 17, fontWeight: 700, marginTop: 4, color }}>{value}</div>

const ConsultasView = () => {

        <div>
          <div style={{ fontSize: 15, fontWeight: 700 }}>{pet?.name}</div>

      </div>
      <div style={{ flex: 1, overflow: 'hidden' }}>

      <NewConsultaModal open={newConsulta} onClose={() => setNewConsulta(false)} />

  );
};

window.ConsultasView = ConsultasView;

</script>

const LibretaView = () => {
  const [petId, setPetId] = useState(1);
  const pet = PETS.find(p => p.id === petId);
  const owner = CLIENTS.find(c => c.id === pet?.ownerId);
  const [open, setOpen] = useState('vacunas');
  const [addModal, setAddModal] = useState(null);
  const [editModal, setEditModal] = useState(null); // { catId, catColor, idx, item }
  const [cats, setCats] = useState(LIBRETA_CATS);
  const [formData, setFormData] = useState(null);

  const handleAddItem = () => {
    if (!formData || !formData.name) return;
    setCats(cats.map(c => c.id === addModal.catId ? { ...c, items: [...c.items, { name: formData.name, date: formData.date || new Date().toISOString().slice(0,10), proxima: formData.proxima || null, status: formData.status || 'vigente' }], count: c.count + 1 } : c));
    setAddModal(null);
    setFormData(null);
  };

  const handleEditItem = () => {
    if (!formData || !editModal) return;
    setCats(cats.map(c => c.id === editModal.catId ? { ...c, items: c.items.map((it, i) => i === editModal.idx ? { ...it, ...formData } : it) } : c));
    setEditModal(null);
    setFormData(null);
  };

  const handleDeleteItem = (catId, idx) => {
    setCats(cats.map(c => c.id === catId ? { ...c, items: c.items.filter((_, i) => i !== idx), count: c.count - 1 } : c));
    setEditModal(null);
  };

  return (
    <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 18, overflow: 'auto', flex: 1 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px', background: 'white', border: '1px solid #EFEAEE', borderRadius: 12 }}>
        <PetAvatar pet={pet} size={44} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 16, fontWeight: 700 }}>{pet?.name} <span style={{ color: '#888', fontWeight: 500, fontSize: 14 }}>· {owner?.name}</span></div>
          <div style={{ fontSize: 12, color: '#888' }}>{pet?.species} · {pet?.breed} · {pet?.weight}kg · Chip: {pet?.chip} · Tel. {owner?.phone}</div>
        </div>
        <select value={petId} onChange={(e) => setPetId(+e.target.value)} style={{ height: 36, padding: '0 32px 0 12px', borderRadius: 8, border: '1px solid #E0DCE0', fontSize: 13, fontFamily: 'inherit', cursor: 'pointer', outline: 'none' }}>
          {PETS.map(p => {
            const o = CLIENTS.find(c => c.id === p.ownerId);
            return <option key={p.id} value={p.id}>{p.name} — {o?.name}</option>;
          })}
        </select>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {cats.map(cat => {
          const I = cat.icon;
          const isOpen = open === cat.id;
          return (
            <div key={cat.id} onClick={() => setOpen(cat.id)} style={{
              background: 'white', borderRadius: 12, padding: 16, cursor: 'pointer',
              border: `1px solid ${isOpen ? cat.color : '#EFEAEE'}`,
              boxShadow: isOpen ? `0 4px 16px ${cat.color}1a` : 'none',
              transition: 'all .15s',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <div style={{ width: 38, height: 38, borderRadius: 10, background: cat.color + '14', color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I size={18} /></div>
                <div style={{ fontSize: 22, fontWeight: 800, color: '#1A1A1A' }}>{cat.count}</div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{cat.label}</div>
              <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>
                {cat.count === 0 ? 'Sin registros' : `${cat.count} ${cat.count === 1 ? 'registro' : 'registros'}`}
              </div>
            </div>
          );
        })}
      </div>

      {/* Open category detail */}
      {(() => {
        const cat = cats.find(c => c.id === open);
        const I = cat.icon;
        return (
          <div style={{ background: 'white', border: '1px solid #EFEAEE', borderRadius: 12, padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: cat.color + '14', color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I size={16} /></div>
                <div style={{ fontSize: 15, fontWeight: 700 }}>{cat.label}</div>
              </div>
              <Btn size="sm" icon={<IconPlus />} onClick={() => { setFormData({ name: '', date: new Date().toISOString().slice(0,10), proxima: '', status: 'vigente' }); setAddModal({ catId: cat.id, catLabel: cat.label, catColor: cat.color }); }}>Agregar</Btn>
            </div>
            {cat.items.length === 0 ? (
              <div style={{ padding: '32px 0', textAlign: 'center', color: '#888', fontSize: 13 }}>Sin registros para esta categoría</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {cat.items.map((it, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '12px 14px', background: '#FAFAF8', borderRadius: 10 }}>
                    <div style={{ width: 6, height: 36, borderRadius: 4, background: cat.color }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 600 }}>{it.name}</div>
                      <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>
                        Aplicado: {it.date}{it.proxima ? ` · Próxima: ${it.proxima}` : ''}
                      </div>
                    </div>
                    <Pill color={it.status === 'vigente' || it.status === 'normal' || it.status === 'completada' || it.status === 'activa' ? '#1F8A5B' : it.status === 'proxima' ? '#D97706' : it.status === 'vencido' ? '#C2185B' : '#888'}>
                      {it.status}
                    </Pill>
                    <button onClick={() => { setFormData({...it}); setEditModal({ catId: cat.id, catLabel: cat.label, catColor: cat.color, idx: i }); }} style={{ background: 'transparent', border: '1px solid #EFEAEE', borderRadius: 6, color: '#666', cursor: 'pointer', padding: 6, display: 'flex' }}><IconEdit size={14} /></button>
                    <button onClick={() => handleDeleteItem(cat.id, i)} style={{ background: 'transparent', border: '1px solid #F2D5E2', borderRadius: 6, color: '#C2185B', cursor: 'pointer', padding: 6, display: 'flex' }}><IconTrash size={14} /></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* Add modal */}
      {addModal && formData && (
        <Modal open={true} onClose={() => { setAddModal(null); setFormData(null); }} title={`Agregar · ${addModal.catLabel}`} width={460}
          footer={<><Btn variant="ghost" onClick={() => { setAddModal(null); setFormData(null); }}>Cancelar</Btn><Btn variant="primary" icon={<IconCheck />} onClick={handleAddItem} disabled={!formData.name}>Guardar</Btn></>}>
          <LibretaForm catId={addModal.catId} catColor={addModal.catColor} data={formData} onChange={setFormData} />
        </Modal>
      )}

      {/* Edit modal */}
      {editModal && formData && (
        <Modal open={true} onClose={() => { setEditModal(null); setFormData(null); }} title={`Editar · ${editModal.catLabel}`} width={460}
          footer={<>
            <Btn variant="danger" icon={<IconTrash />} onClick={() => handleDeleteItem(editModal.catId, editModal.idx)} style={{ marginRight: 'auto' }}>Eliminar</Btn>
            <Btn variant="ghost" onClick={() => { setEditModal(null); setFormData(null); }}>Cancelar</Btn>
            <Btn variant="primary" icon={<IconCheck />} onClick={handleEditItem} disabled={!formData.name}>Guardar</Btn>
          </>}>
          <LibretaForm catId={editModal.catId} catColor={editModal.catColor} data={formData} onChange={setFormData} />
        </Modal>
      )}
    </div>
  );
};

const LibretaForm = ({ catId, catColor, data, onChange }) => {
  const needsProxima = ['vacunas','antiparasitarios'].includes(catId);
  const statusOpts = {
    vacunas: ['vigente','proxima','vencida'],
    antiparasitarios: ['vigente','vencido'],
    cirugias: ['completada','programada'],
    estudios: ['normal','alterado','pendiente'],
    medicacion: ['activa','finalizada'],
    alergias: ['confirmada','sospechada'],
  }[catId] || ['vigente'];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <Field label="Nombre / descripción">
        <Input autoFocus placeholder="Ej. Séxtuple Nobivac" value={data.name || ''} onChange={(e) => onChange({...data, name: e.target.value})} />
      </Field>
      <div style={{ display: 'grid', gridTemplateColumns: needsProxima ? '1fr 1fr' : '1fr', gap: 10 }}>
        <Field label="Fecha"><Input type="date" value={data.date || ''} onChange={(e) => onChange({...data, date: e.target.value})} /></Field>
        {needsProxima && <Field label="Próxima"><Input type="date" value={data.proxima || ''} onChange={(e) => onChange({...data, proxima: e.target.value})} /></Field>}
      </div>
      <Field label="Estado">
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {statusOpts.map(s => (
            <button key={s} onClick={() => onChange({...data, status: s})} style={{ padding: '6px 14px', borderRadius: 8, border: data.status === s ? `2px solid ${catColor}` : '1px solid #E0DCE0', background: data.status === s ? catColor + '14' : 'white', color: data.status === s ? catColor : '#666', fontWeight: data.status === s ? 700 : 500, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, textTransform: 'capitalize' }}>{s}</button>
          ))}
        </div>
      </Field>
    </div>
  );
};

window.LibretaView = LibretaView;

</script>

// Mensajes - chat moderno
const MensajesView = ({ initialClientId }) => {
  const [active, setActive] = useState(initialClientId || 2);
  const [search, setSearch] = useState('');
  const [chatLogs, setChatLogs] = useState(CHAT_LOGS);
  const conv = MENSAJES.find(m => m.id === active);
  const client = CLIENTS.find(c => c.id === conv?.clientId);
  const [draft, setDraft] = useState('');
  const [showEmoji, setShowEmoji] = useState(false);
  const chatLog = chatLogs[active] || [];

  const send = () => {
    if (!draft.trim()) return;
    setChatLogs({ ...chatLogs, [active]: [...chatLog, { from: 'me', text: draft, time: 'ahora' }] });
    setDraft('');
  };

  const filteredMensajes = MENSAJES.filter(m => {
    if (!search.trim()) return true;
    const c = CLIENTS.find(cl => cl.id === m.clientId);
    return c?.name.toLowerCase().includes(search.toLowerCase()) || m.lastMsg.toLowerCase().includes(search.toLowerCase());
  });

  return (
    <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '320px 1fr', overflow: 'hidden', background: 'white' }}>
      {/* Conversations list */}
      <div style={{ borderRight: '1px solid #EFEAEE', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ padding: '14px 16px', borderBottom: '1px solid #EFEAEE' }}>
          <Input icon={<IconSearch />} placeholder="Buscar conversación…" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
        <div style={{ flex: 1, overflow: 'auto' }}>
          {filteredMensajes.length === 0 && <div style={{ padding: '40px 16px', textAlign: 'center', color: '#999', fontSize: 13 }}>Sin resultados</div>}
          {filteredMensajes.map(m => {
            const c = CLIENTS.find(cl => cl.id === m.clientId);
            const isActive = active === m.id;
            return (
              <div key={m.id} onClick={() => setActive(m.id)} style={{
                padding: '12px 16px', display: 'flex', gap: 10, cursor: 'pointer',
                background: isActive ? '#FAF1F7' : 'white',
                borderLeft: isActive ? '3px solid #A3007B' : '3px solid transparent',
                transition: 'background .1s',
              }}
              onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = '#FAFAF8'; }}
              onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = 'white'; }}>
                <div style={{ position: 'relative' }}>
                  <Avatar name={c?.name || ''} size={42} />
                  {m.online && <div style={{ position: 'absolute', bottom: 0, right: 0, width: 11, height: 11, background: '#1F8A5B', borderRadius: '50%', border: '2px solid white' }} />}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <span style={{ fontSize: 13.5, fontWeight: m.unread > 0 ? 700 : 600 }}>{c?.name}</span>
                    <span style={{ fontSize: 10, color: m.unread > 0 ? '#A3007B' : '#999', fontWeight: m.unread > 0 ? 700 : 500 }}>{m.time}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 2 }}>
                    <span style={{ fontSize: 12, color: m.unread > 0 ? '#333' : '#888', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1, fontWeight: m.unread > 0 ? 600 : 400 }}>{m.lastMsg}</span>
                    {m.unread > 0 && <span style={{ background: '#A3007B', color: 'white', fontSize: 10, fontWeight: 700, borderRadius: 10, padding: '1px 6px', minWidth: 16, textAlign: 'center', marginLeft: 6 }}>{m.unread}</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Chat panel */}
      <div style={{ display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#FAF7FA' }}>
        <div style={{ padding: '12px 20px', borderBottom: '1px solid #EFEAEE', display: 'flex', alignItems: 'center', gap: 12, background: 'white' }}>
          <Avatar name={client?.name || ''} size={40} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>{client?.name}</div>
            <div style={{ fontSize: 11, color: '#1F8A5B', display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 6, height: 6, background: '#1F8A5B', borderRadius: '50%' }} /> en línea · WhatsApp</div>
          </div>
          <Btn variant="secondary" size="sm" icon={<IconPhone />}>Llamar</Btn>
          <Btn variant="secondary" size="sm" icon={<IconPaw />}>Ver paciente</Btn>
        </div>
        <div style={{ flex: 1, overflow: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ textAlign: 'center', fontSize: 11, color: '#999', margin: '4px 0 12px' }}>Hoy</div>
          {chatLog.map((m, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: m.from === 'me' ? 'flex-end' : 'flex-start' }}>
              <div style={{
                maxWidth: '60%', padding: m.img || m.file ? 4 : '10px 14px', borderRadius: 14,

                color: m.from === 'me' ? 'white' : '#1A1A1A',
                fontSize: 13.5, lineHeight: 1.5,
                borderTopLeftRadius: m.from === 'client' ? 4 : 14,
                borderTopRightRadius: m.from === 'me' ? 4 : 14,
                boxShadow: m.from === 'client' ? '0 1px 2px rgba(0,0,0,0.04)' : 'none',
              }}>
                {m.img ? (
                  <div style={{ width: 200, height: 140, borderRadius: 10, background: 'repeating-linear-gradient(45deg, #E5E0E5 0 6px, #EFEAEE 6px 12px)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#888', fontSize: 11 }}>🖼 {m.imgName || 'imagen.jpg'}</div>
                ) : m.file ? (
                  <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, borderRadius: 10, background: m.from === 'me' ? 'rgba(255,255,255,0.15)' : '#F4F0F2', minWidth: 180 }}>
                    <div style={{ fontSize: 24 }}>{m.fileIcon || '📎'}</div>
                    <div>
                      <div style={{ fontSize: 12.5, fontWeight: 600 }}>{m.fileName}</div>
                      <div style={{ fontSize: 10, opacity: 0.7 }}>{m.fileSize}</div>
                    </div>
                  </div>
                ) : m.text}
                <div style={{ fontSize: 10, opacity: 0.7, marginTop: 3, textAlign: 'right', padding: m.img || m.file ? '0 8px 4px' : 0 }}>{m.time} {m.from === 'me' && '✓✓'}</div>
              </div>
            </div>
          ))}
        </div>
        {/* Input bar */}
        <div style={{ padding: '10px 14px', borderTop: '1px solid #EFEAEE', background: 'white' }}>
          {showEmoji && (
            <div style={{ marginBottom: 8, padding: '10px 12px', background: '#FAF7FA', borderRadius: 12, border: '1px solid #EFEAEE', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {['😊','😂','🙏','❤️','👍','🐾','🐕','🐈','💊','✅','⚠️','📋','🔔','👋','😔','🤗','💪','🎉','😅','🥰'].map(e => (

              <input type="file" accept=".pdf,.doc,.docx,.mp4,.mov,.avi,.xlsx,.pptx" style={{ display: 'none' }} onChange={(e) => {
                const f = e.target.files[0];
                if (!f) return;
                const icons = { pdf: '📄', doc: '📝', docx: '📝', mp4: '🎥', mov: '🎥', avi: '🎥', xlsx: '📊', pptx: '📊' };
                const ext = f.name.split('.').pop().toLowerCase();
                const kb = (f.size / 1024).toFixed(0);
                setChatLogs({ ...chatLogs, [active]: [...chatLog, { from: 'me', file: true, fileName: f.name, fileIcon: icons[ext] || '📎', fileSize: kb + ' KB', time: 'ahora' }] });
                e.target.value = '';
              }} />
              <IconPaperclip size={20} />
            </label>
            {/* Imagen */}
            <label title="Enviar imagen" style={{ cursor: 'pointer', color: '#888', display: 'flex', padding: 6 }}>
              <input type="file" accept="image/jpeg,image/png" style={{ display: 'none' }} onChange={(e) => {
                const f = e.target.files[0];
                if (!f) return;
                setChatLogs({ ...chatLogs, [active]: [...chatLog, { from: 'me', img: true, imgName: f.name, time: 'ahora' }] });
                e.target.value = '';
              }} />
              <IconImage size={20} />
            </label>
            {/* Emoji */}
            <button onClick={() => setShowEmoji(v => !v)} style={{ background: showEmoji ? '#FAF1F7' : 'transparent', border: 'none', color: showEmoji ? '#A3007B' : '#888', cursor: 'pointer', padding: 6, display: 'flex', borderRadius: 6 }}><IconSmile size={20} /></button>
            <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && send()} placeholder="Escribir mensaje…" style={{ flex: 1, height: 38, padding: '0 14px', border: '1px solid #E0DCE0', borderRadius: 999, fontSize: 13.5, fontFamily: 'inherit', outline: 'none' }} />

  const avgMargin = products.filter(p => p.costo > 0).reduce((s, p) => s + margin(p.costo, p.venta), 0) / products.filter(p => p.costo > 0).length;
